        \ | auto | off | fan_only | dry\n  const action = e.attributes.hvac_action;  // heating | cooling | idle | fan | off\n\
        \  const current = e.attributes.current_temperature;\n  const target = e.attributes.temperature\n               ??\
        \ e.attributes.target_temp_high\n               ?? null;\n  const targetLow  = e.attributes.target_temp_low;\n  const\
        \ targetHigh = e.attributes.target_temp_high;\n  const fan = e.attributes.fan_mode;\n  const presets = e.attributes.preset_mode;\n\
        \  const unit = e.attributes.unit_of_measurement\n            ?? states['weather.forecast_home']?.attributes?.temperature_unit\n\
        \            ?? '°';\n  const friendly = (variables.cute_name || e.attributes.friendly_name || 'Climate').trim();\n\
        \  const emoji = variables.emoji || '\U0001F321';\n\n  // ── Friendly status sentence ──\n  let status, accentColor,\
        \ glow;\n  if (mode === 'off') {\n    status = 'Resting';\n    accentColor = 'rgba(255, 235, 215, 0.55)';\n    glow\
        \ = 'rgba(255, 235, 215, 0.10)';\n  } else if (action === 'heating') {\n    status = `Warming up to ${Math.round(target)}°`;\n\
        \    accentColor = '#ff9a7c';\n    glow = 'rgba(255, 154, 124, 0.32)';\n  } else if (action === 'cooling') {\n   \
        \ status = `Cooling to ${Math.round(target)}°`;\n    accentColor = '#9cc8e8';\n    glow = 'rgba(156, 200, 232, 0.32)';\n\
        \  } else if (action === 'fan') {\n    status = 'Just air circulating';\n    accentColor = '#c8d8e8';\n    glow =\
        \ 'rgba(200, 216, 232, 0.25)';\n  } else if (action === 'idle' && current && target && Math.abs(current - target)\
        \ < 1) {\n    status = 'Just right ✨';\n    accentColor = '#bce0c8';\n    glow = 'rgba(188, 224, 200, 0.28)';\n  }\
        \ else if (mode === 'heat_cool' || mode === 'auto') {\n    status = `Auto · feeling ${Math.round(current)}°`;\n  \
        \  accentColor = '#d8c8e8';\n    glow = 'rgba(216, 200, 232, 0.25)';\n  } else {\n    status = `Cozy at ${Math.round(current)}°`;\n\
        \    accentColor = '#e8d8a8';\n    glow = 'rgba(232, 216, 168, 0.25)';\n  }\n\n  // ── Mode pill ──\n  const modeMap\
        \ = {\n    heat:      { icon: '\U0001F525', label: 'Heating' },\n    cool:      { icon: '❄️', label: 'Cooling' },\n\
        \    heat_cool: { icon: '\U0001F300', label: 'Auto' },\n    auto:      { icon: '\U0001F300', label: 'Auto' },\n  \
        \  fan_only:  { icon: '\U0001F4A8', label: 'Fan' },\n    dry:       { icon: '\U0001F4A7', label: 'Dry' },\n    off:\
        \       { icon: '○',  label: 'Off' },\n  };\n  const m = modeMap[mode] || { icon: '○', label: mode };\n\n  // ── Target\
        \ temp display ──\n  let targetDisplay = '';\n  if (mode !== 'off' && targetLow !== undefined && targetHigh !== undefined)\
        \ {\n    targetDisplay = `${Math.round(targetLow)}° – ${Math.round(targetHigh)}°`;\n  } else if (mode !== 'off' &&\
        \ target) {\n    targetDisplay = `→ ${Math.round(target)}°`;\n  }\n\n  return `\n    <div style=\"\n      position:\
        \ relative;\n      width: 100%; height: 100%;\n      padding: 16px 18px;\n      border-radius: 18px;\n      background:\
        \ linear-gradient(160deg, ${glow} 0%, rgba(30,22,28,0.6) 60%, rgba(20,15,22,0.7) 100%);\n      border: 1px solid ${accentColor}33;\n\
        \      backdrop-filter: blur(14px) saturate(140%);\n      box-shadow: 0 0 28px ${glow}, inset 0 1px 0 rgba(255,255,255,0.06);\n\
        \      transition: all 0.6s ease-out;\n      ${(action === 'heating' || action === 'cooling') ? 'animation: gentleBreathe\
        \ 5s ease-in-out infinite;' : ''}\n    \">\n      <!-- top row: emoji + name + mode pill -->\n      <div style=\"\
        display:flex; align-items:center; justify-content:space-between; gap:10px; margin-bottom:10px;\">\n        <div style=\"\
        display:flex; align-items:center; gap:8px;\">\n          <span style=\"font-size:22px;\">${emoji}</span>\n       \
        \   <span style=\"\n            font-family: 'Inter', sans-serif;\n            font-size: 13px;\n            font-weight:\
        \ 400;\n            color: rgba(255, 235, 215, 0.92);\n            letter-spacing: 0.02em;\n          \">${friendly}</span>\n\
        \        </div>\n        <span style=\"\n          display:inline-flex; align-items:center; gap:5px;\n          padding:\
        \ 3px 10px;\n          border-radius: 999px;\n          background: ${accentColor}22;\n          border: 1px solid\
        \ ${accentColor}55;\n          font-family: 'Inter', sans-serif;\n          font-size: 11px;\n          color: ${accentColor};\n\
        \        \">\n          <span>${m.icon}</span>${m.label}\n        </span>\n      </div>\n\n      <!-- big current\
        \ temp -->\n      <div style=\"display:flex; align-items:baseline; gap:8px;\">\n        <div style=\"\n          font-family:\
        \ 'Inter', sans-serif;\n          font-size: 42px;\n          font-weight: 200;\n          color: rgba(255, 245, 230,\
        \ 0.97);\n          line-height: 1;\n          letter-spacing: -0.02em;\n        \">${current !== undefined ? Math.round(current)\
        \ : '–'}<span style=\"font-size:22px; opacity:0.7;\">°</span></div>\n        ${targetDisplay ? `<div style=\"\n  \
        \        font-family: 'Inter', sans-serif;\n          font-size: 14px;\n          font-weight: 300;\n          color:\
        \ rgba(255, 235, 215, 0.65);\n        \">${targetDisplay}</div>` : ''}\n      </div>\n\n      <!-- status sentence\
        \ -->\n      <div style=\"\n        margin-top: 8px;\n        font-family: 'Caveat', 'Georgia', cursive;\n       \
        \ font-style: italic;\n        font-size: 16px;\n        color: rgba(255, 230, 210, 0.85);\n      \">${status}</div>\n\
        \n      <!-- fan + preset extras -->\n      ${(fan && fan !== 'auto') || presets ? `\n        <div style=\"\n    \
        \      margin-top: 6px;\n          font-family: 'Inter', sans-serif;\n          font-size: 11px;\n          color:\
        \ rgba(255, 235, 215, 0.55);\n        \">\n          ${fan && fan !== 'auto' ? `\U0001F4A8 ${fan}` : ''}\n       \
        \   ${presets && presets !== 'none' ? `${fan && fan !== 'auto' ? ' · ' : ''}${presets}` : ''}\n        </div>` : ''}\n\
        \n      <!-- inner halo accent -->\n      <div style=\"\n        position:absolute; inset:0; border-radius:18px; pointer-events:none;\n\
        \        background: radial-gradient(circle at 80% 25%, ${glow} 0%, transparent 55%);\n        opacity: ${(action\
        \ === 'heating' || action === 'cooling') ? 0.85 : 0.5};\n      \"></div>\n    </div>`;\n]]]\n"
    styles:
      card:
      - background: none
      - border: none
      - padding: 0
      - width: 100%
      - height: 150px
      - cursor: pointer
      custom_fields:
        body:
        - width: 100%
        - height: 100%
  cozy_vacuum_tile:
    variables:
      vacuum_entity: vacuum.unknown
      cute_name: ''
      emoji: 🤖
    show_name: false
    show_icon: false
    tap_action:
      action: "[[[\n  const e = states[variables.vacuum_entity];\n  if (!e) return 'none';\n  const s = e.state;\n  if (s\
        \ === 'docked' || s === 'idle') return 'call-service';\n  if (s === 'cleaning') return 'call-service';\n  if (s ===\
        \ 'paused') return 'call-service';\n  return 'more-info';\n]]]\n"
      service: "[[[\n  const e = states[variables.vacuum_entity];\n  if (!e) return '';\n  const s = e.state;\n  if (s ===\
        \ 'docked' || s === 'idle') return 'vacuum.start';\n  if (s === 'cleaning') return 'vacuum.pause';\n  if (s === 'paused')\
        \ return 'vacuum.start';\n  return '';\n]]]\n"
      target:
        entity_id: '[[[ return variables.vacuum_entity; ]]]'
    hold_action:
      action: call-service
