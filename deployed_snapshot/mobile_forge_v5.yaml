kiosk_mode:
  non_admin_settings:
    hide_header: true
    hide_sidebar: true
  admin_settings:
    hide_header: true
    hide_sidebar: false
title: Mobile Forge
views:
- title: Home
  path: home
  icon: mdi:home
  type: sections
  max_columns: 1
  card_mod:
    style: "{% set wp = states('input_select.forge_wallpaper') %} :host {\n  {% if wp not in ['None', 'unavailable', 'unknown']\
      \ %}\n  background-image: linear-gradient(rgba(0,0,0,0.55), rgba(0,0,0,0.72)),\n                    url('/local/wallpapers/{{\
      \ wp | lower }}.jpg') !important;\n  background-size: cover !important;\n  background-position: center center !important;\n\
      \  background-attachment: fixed !important;\n  {% endif %}\n}\n\n:host { padding-bottom: max(96px, calc(env(safe-area-inset-bottom,\
      \ 0px) + 80px)) !important; padding-top: env(safe-area-inset-top, 0px) !important; }"
  sections:
  - type: grid
    cards:
    - type: custom:button-card
      template: sky_system
      tap_action:
        action: none
      hold_action:
        action: none
    - type: custom:button-card
      template: mf_page_title
      variables:
        title: Home
        subtitle: Animated sky, house status, and quick controls.
    - type: custom:button-card
      template: mf_hero
      entity: weather.forecast_home
      variables:
        icon: mdi:weather-partly-cloudy
        value: '[[[ return Math.round(entity?.attributes?.temperature ?? 56) + "°"; ]]]'
        subtitle: '[[[ const raw = entity?.state || "clear night"; const condition = raw.replace(/-/g, " "); const humidity
          = entity?.attributes?.humidity; const wind = entity?.attributes?.wind_speed; return `${condition}${humidity ? "
          · " + humidity + "% humidity" : ""}${wind ? " · " + Math.round(wind) + " mph wind" : ""}`; ]]]'
        accent_color: rgba(255,211,164,0.96)
    - type: grid
      columns: 2
      square: false
      cards:
      - type: custom:button-card
        template: mf_tile
        variables:
          icon: mdi:car-electric
          title: El Rocco
          value: '[[[ const n = Number(entity?.state); return Number.isFinite(n) ? Math.round(n) + "%" : "48%"; ]]]'
          subtitle: charging
          accent_color: rgba(121,199,255,0.95)
        entity: sensor.el_rocco_battery_level
        tap_action:
          action: navigate
          navigation_path: /mobile-forge/tesla
      - type: custom:button-card
        template: mf_tile
        variables:
          icon: mdi:lightbulb-group
          title: Lights
          value: '[[[ return entity?.state && entity.state !== "unavailable" ? entity.state.replace(/_/g, " ") : "Ready";
            ]]]'
          subtitle: rooms + scenes
          accent_color: rgba(255,211,164,0.96)
        entity: light.living_room_2
        tap_action:
          action: navigate
          navigation_path: /mobile-forge/lights
      - type: custom:button-card
        template: mf_tile
        variables:
          icon: mdi:shield-lock
          title: Security
          value: '[[[ return entity?.state && entity.state !== "unavailable" ? entity.state.replace(/_/g, " ") : "Armed";
            ]]]'
          subtitle: front door clear
          accent_color: rgba(157,226,182,0.95)
        entity: alarm_control_panel.nas_blink_home_security
        tap_action:
          action: navigate
          navigation_path: /mobile-forge/security
      - type: custom:button-card
        template: mf_tile
        variables:
          icon: mdi:home-assistant
          title: Sebastian
          value: '[[[ return entity?.state === "off" ? "Online" : (entity?.state || "Online").replace(/_/g, " "); ]]]'
          subtitle: assistant ready
          accent_color: rgba(121,199,255,0.95)
        entity: update.home_assistant_core_update
        tap_action:
          action: navigate
          navigation_path: /mobile-forge/house
    - type: horizontal-stack
      cards:
      - type: custom:button-card
        template: mf_pill
        variables:
          icon: mdi:candle
          label: Cozy
          accent_color: rgba(255,211,164,0.96)
      - type: custom:button-card
        template: mf_pill
        variables:
          icon: mdi:movie-open
          label: Movie
          accent_color: rgba(121,199,255,0.95)
      - type: custom:button-card
        template: mf_pill
        variables:
          icon: mdi:white-balance-sunny
          label: Bright
          accent_color: rgba(255,211,164,0.96)
      - type: custom:button-card
        template: mf_pill
        variables:
          icon: mdi:weather-night
          label: Sleep
          accent_color: rgba(243,166,184,0.95)
    - type: custom:button-card
      template: mf_nav_spacer
    - type: custom:navbar-card
      routes:
      - url: /mobile-forge/home
        icon: mdi:home
      - url: /mobile-forge/lights
        icon: mdi:lightbulb-group
      - url: /mobile-forge/media
        icon: mdi:television-play
      - url: /mobile-forge/tesla
        icon: mdi:car-electric
      - url: /mobile-forge/security
        icon: mdi:shield-lock
      - url: /mobile-forge/house
        icon: mdi:home-thermometer
      card_mod:
        style: ':host { position: fixed !important; left: 12px !important; right: 12px !important; bottom: max(12px, env(safe-area-inset-bottom,
          0px)) !important; z-index: 999 !important; }

          ha-card { border-radius: 22px !important; border: 1px solid rgba(255,255,255,0.12) !important; background: rgba(15,15,18,0.90)
          !important; backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); box-shadow: 0 18px 48px rgba(0,0,0,0.32)
          !important; padding-bottom: env(safe-area-inset-bottom, 0px); overflow: hidden; }

          '
  dense_section_placement: true
