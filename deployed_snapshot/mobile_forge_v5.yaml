        - z-index: "[[[\n  const state = states['weather.forecast_home'].state.toLowerCase();\n  const isFoggy = ['fog','mist','smoke','haze','dust','cloudy','partlycloudy'].some(t\
            \ => state.includes(t));\n  return isFoggy ? 7 : 5;\n]]]\n"
