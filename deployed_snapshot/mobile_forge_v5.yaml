        - background: "[[[\n  const sun = states['sun.sun'];\n  const ele = sun.attributes.elevation;\n  const isDay = sun.state\
            \ === 'above_horizon';\n  const lerp = (a,b,t) => a + (b-a)*t;\n  const blend = (c1,c2,t) =>\n    `rgba(${lerp(c1[0],c2[0],t)},\
            \ ${lerp(c1[1],c2[1],t)}, ${lerp(c1[2],c2[2],t)}, ${lerp(c1[3],c2[3],t)})`;\n  if (isDay) {\n    let progress\
            \ = Math.min(Math.max(ele/45, 0), 1);\n    const pct = Math.pow(progress, 0.6);\n    let top = blend([10,20,125,0.65],\
            \ [5,10,80,0.6], pct);\n    let mid = blend([60,120,150,0.55], [110,165,190,0.5], pct);\n    let bot;\n    if\
            \ (ele < 18) {\n      let warmPct = Math.max(0, (10-ele)/10);\n      let glow = Math.pow(warmPct, 0.8);\n    \
            \  bot = blend([202,110,70,0.85], [200,65,10,0.55], glow);\n    } else {\n      bot = blend([75,140,145,0.6],\
            \ [80,110,150,0.8], pct);\n    }\n    return `linear-gradient(180deg, ${top} 0%, ${mid} 50%, ${bot} 95%)`;\n \
            \ }\n  const absEle = Math.abs(ele);\n  if (ele < -20) return `linear-gradient(180deg, rgba(8,12,25,0.85) 0%,\
            \ rgba(12,18,35,0.75) 100%)`;\n  let pct = Math.min(absEle/20, 1);\n  let top = blend([8,12,25,0.85], [20,30,50,0.7],\
            \ pct);\n  let bot = blend([12,18,35,0.75], [40,60,80,0.6], pct);\n  return `linear-gradient(180deg, ${top} 0%,\
            \ ${bot} 100%)`;\n]]]\n"
        blur_overlay:
