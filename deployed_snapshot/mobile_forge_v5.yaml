        \    background: ${s.color};\n        box-shadow: 0 0 10px ${s.glow};\n        ${isArmed ? 'animation: gentleBreathe\
        \ 4s ease-in-out infinite;' : ''}\n      \"></div>\n    </div>`;\n]]]\n"
    styles:
