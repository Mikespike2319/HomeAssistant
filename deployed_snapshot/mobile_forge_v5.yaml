        >\n      ${variables.media_player_entity} not found\n    </div>`;\n  }\n\n  const state = e.state;\n  const isPlaying\
        \ = state === 'playing';\n  const isPaused = state === 'paused';\n  const isOff = state === 'off' || state === 'unavailable'\
        \ || state === 'standby';\n  const isIdle = state === 'idle' || isOff;\n\n  const friendly = (variables.cute_name\
        \ || e.attributes.friendly_name || 'Speaker').trim();\n  const emoji = variables.emoji || '\U0001F50A';\n\n  const\
        \ albumArt = e.attributes.entity_picture || '';\n  const title    = e.attributes.media_title || '';\n  const artist\
        \   = e.attributes.media_artist || '';\n  const album    = e.attributes.media_album_name || '';\n  const source  \
        \ = e.attributes.source || '';\n  const volume   = Math.round((e.attributes.volume_level || 0) * 100);\n  const muted\
        \    = e.attributes.is_volume_muted;\n\n  const hasArt = albumArt && !isIdle;\n  const bgStyle = hasArt\n    ? `background-image:\
        \ url('${albumArt}'); background-size: cover; background-position: center;`\n    : `background: linear-gradient(160deg,\
        \ rgba(40,28,38,0.6) 0%, rgba(20,15,24,0.75) 100%);`;\n\n  // Transport state pill\n  let transport;\n  if (isPlaying)\
        \      transport = `▶ Playing`;\n  else if (isPaused)  transport = `⏸ Paused`;\n  else if (isOff)     transport =\
        \ `○ Off`;\n  else                transport = `○ Quiet`;\n\n  const showSong = (isPlaying || isPaused) && title;\n\
        \n  return `\n    <div style=\"\n      position: relative;\n      width: 100%; height: 100%;\n      border-radius:\
