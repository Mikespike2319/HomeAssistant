      target:
        entity_id: '[[[ return variables.vacuum_entity; ]]]'
    custom_fields:
      body: "[[[\n  const e = states[variables.vacuum_entity];\n  if (!e) {\n    return `<div style=\"color:#888;font-size:12px;padding:14px;\"\
        >\n      ${variables.vacuum_entity} not found\n    </div>`;\n  }\n\n  const state = e.state;\n  const battery = e.attributes.battery_level\n\
        \               ?? e.attributes.battery\n               ?? null;\n  const fanSpeed = e.attributes.fan_speed;\n  const\
        \ friendly = (variables.cute_name || e.attributes.friendly_name || 'Vacuum').trim();\n  const emoji = variables.emoji\
        \ || '\U0001F916';\n\n  // ── Friendly state mapping ──\n  const stateMap = {\n    docked:    { label: 'Resting at\
        \ home',     accent: '#bce0c8', glow: 'rgba(188,224,200,0.25)', anim: '' },\n    idle:      { label: 'Ready when you\
        \ are',  accent: '#e8d8a8', glow: 'rgba(232,216,168,0.22)', anim: '' },\n    cleaning:  { label: 'Tidying up the place',accent:\
        \ '#9cc8e8', glow: 'rgba(156,200,232,0.32)', anim: 'animation: gentleBreathe 2.5s ease-in-out infinite;' },\n    returning:\
        \ { label: 'Heading home to dock',accent: '#d8b9e8', glow: 'rgba(216,185,232,0.30)', anim: 'animation: gentleBreathe\
        \ 3s ease-in-out infinite;' },\n    paused:    { label: 'Taking a little break',accent: '#e8c8a8', glow: 'rgba(232,200,168,0.28)',\
        \ anim: '' },\n    error:     { label: 'Got stuck — needs a hand', accent: '#ff8a6a', glow: 'rgba(255,138,106,0.40)',\
        \ anim: 'animation: chargingPulse 1.6s ease-in-out infinite;' },\n    unavailable: { label: 'Off the grid',      accent:\
        \ '#888',     glow: 'rgba(128,128,128,0.15)', anim: '' },\n  };\n  const s = stateMap[state] || { label: state, accent:\
        \ '#aaa', glow: 'rgba(255,255,255,0.15)', anim: '' };\n\n  // ── Battery bar component ──\n  let batteryHtml = '';\n\
        \  if (battery !== null) {\n    const batBar = battery < 20 ? '#ff8a6a' : battery < 50 ? '#ffd6a8' : '#bce0c8';\n\
        \    const charging = state === 'docked' && battery < 100;\n    batteryHtml = `\n      <div style=\"display:flex;\
        \ align-items:center; gap:6px; margin-top: 6px;\">\n        <div style=\"\n          position:relative; width:60px;\
        \ height:10px;\n          border:1px solid rgba(255,235,215,0.5);\n          border-radius:3px;\n          background:\
        \ rgba(0,0,0,0.3);\n        \">\n          <div style=\"\n            position:absolute; top:1px; left:1px; bottom:1px;\n\
        \            width:${battery}%;\n            background: ${batBar};\n            border-radius:2px;\n            ${charging\
        \ ? 'animation: chargingPulse 1.8s ease-in-out infinite;' : ''}\n            transition: width 1s ease-out;\n    \
        \      \"></div>\n        </div>\n        <span style=\"font-family:'Inter',sans-serif; font-size:11px; color:rgba(255,235,215,0.7);\"\
        >\n          ${charging ? '⚡ ' : ''}${battery}%\n        </span>\n      </div>`;\n  }\n\n  return `\n    <div style=\"\
        \n      position: relative;\n      width: 100%; height: 100%;\n      padding: 16px 18px;\n      border-radius: 18px;\n\
        \      background: linear-gradient(160deg, ${s.glow} 0%, rgba(30,22,28,0.6) 60%, rgba(20,15,22,0.7) 100%);\n     \
        \ border: 1px solid ${s.accent}40;\n      backdrop-filter: blur(14px) saturate(140%);\n      box-shadow: 0 0 24px\
        \ ${s.glow}, inset 0 1px 0 rgba(255,255,255,0.06);\n      transition: all 0.6s ease-out;\n      ${s.anim}\n    \"\
        >\n      <!-- top: emoji + name -->\n      <div style=\"display:flex; align-items:center; gap:8px; margin-bottom:10px;\"\
        >\n        <span style=\"font-size:24px; ${state === 'cleaning' ? 'animation: gentleBreathe 1s ease-in-out infinite;'\
        \ : ''}\">${emoji}</span>\n        <span style=\"\n          font-family: 'Inter', sans-serif;\n          font-size:\
        \ 13px;\n          font-weight: 400;\n          color: rgba(255, 235, 215, 0.92);\n          letter-spacing: 0.02em;\n\
        \        \">${friendly}</span>\n      </div>\n\n      <!-- main status -->\n      <div style=\"\n        font-family:\
        \ 'Caveat', 'Georgia', cursive;\n        font-style: italic;\n        font-size: 22px;\n        font-weight: 500;\n\
        \        color: ${s.accent};\n        text-shadow: 0 1px 4px rgba(0,0,0,0.4);\n        line-height: 1.1;\n      \"\
        >${s.label}</div>\n\n      ${batteryHtml}\n\n      ${fanSpeed ? `<div style=\"\n        margin-top: 4px;\n       \
        \ font-family: 'Inter', sans-serif;\n        font-size: 11px;\n        color: rgba(255, 235, 215, 0.55);\n      \"\
        >\U0001F4A8 ${fanSpeed}</div>` : ''}\n\n      <!-- status dot -->\n      <div style=\"\n        position:absolute;\
        \ top:16px; right:18px;\n        width:9px; height:9px; border-radius:50%;\n        background: ${s.accent};\n   \
        \     box-shadow: 0 0 10px ${s.glow};\n        ${state === 'cleaning' || state === 'returning' ? 'animation: chargingPulse\
        \ 1.4s ease-in-out infinite;' : ''}\n      \"></div>\n\n      <!-- inner halo accent -->\n      <div style=\"\n  \
        \      position:absolute; inset:0; border-radius:18px; pointer-events:none;\n        background: radial-gradient(circle\
        \ at 85% 30%, ${s.glow} 0%, transparent 60%);\n        opacity: 0.6;\n      \"></div>\n    </div>`;\n]]]\n"
    styles:
      card:
      - background: none
      - border: none
      - padding: 0
      - width: 100%
      - height: 150px
      - cursor: pointer
      custom_fields:
        body:
        - width: 100%
        - height: 100%
  cozy_weather_hero:
    variables:
      weather_entity: weather.forecast_home
      cute_name: ''
    show_name: false
    show_icon: false
    tap_action:
      action: more-info
      entity: '[[[ return variables.weather_entity; ]]]'
    custom_fields:
      body: "[[[\n  const w = states[variables.weather_entity];\n  if (!w) {\n    return `<div style=\"color:#888;font-size:13px;padding:18px;\"\
        >\n      ${variables.weather_entity} not found\n    </div>`;\n  }\n\n  const condition = w.state;\n  const temp =\
        \ w.attributes.temperature;\n  const apparent = w.attributes.apparent_temperature ?? w.attributes.feels_like;\n  const\
        \ humidity = w.attributes.humidity;\n  const wind = w.attributes.wind_speed;\n  const windDir = w.attributes.wind_bearing;\n\
        \  const pressure = w.attributes.pressure;\n  const tempUnit = w.attributes.temperature_unit || '°';\n  const speedUnit\
        \ = w.attributes.wind_speed_unit || 'mph';\n\n  // Sun entity for sunrise/sunset\n  const sun = states['sun.sun'];\n\
        \  const isDay = sun && sun.state === 'above_horizon';\n  const fmtTime = (iso) => {\n    if (!iso) return '–';\n\
        \    const d = new Date(iso);\n    const hh = d.getHours() % 12 || 12;\n    const mm = String(d.getMinutes()).padStart(2,\
        \ '0');\n    const ampm = d.getHours() >= 12 ? 'PM' : 'AM';\n    return `${hh}:${mm} ${ampm}`;\n  };\n  const sunriseStr\
        \ = sun ? fmtTime(sun.attributes.next_rising) : '–';\n  const sunsetStr  = sun ? fmtTime(sun.attributes.next_setting)\
        \ : '–';\n\n  // ── Condition mapping ──\n  const condMap = {\n    'clear-night':     { emoji: '\U0001F319',  mood:\
        \ 'Quiet starry night',     warm: 'Peaceful evening',          cold: 'Crisp clear night',         glow: 'rgba(180,200,240,0.18)'\
        \ },\n    'sunny':           { emoji: '☀️',  mood: 'Sunshine everywhere',     warm: 'Beautiful sunny day',       cold:\
        \ 'Bright and brisk',          glow: 'rgba(255,210,140,0.30)' },\n    'partlycloudy':    { emoji: '⛅',  mood: 'A few\
        \ wandering clouds',   warm: 'Mostly sunny',              cold: 'Patchy clouds, cool out',   glow: 'rgba(220,220,235,0.22)'\
        \ },\n    'cloudy':          { emoji: '☁️',  mood: 'Soft gray skies',          warm: 'Mild and overcast',        \
        \  cold: 'Gray and chilly',           glow: 'rgba(190,200,215,0.22)' },\n    'rainy':           { emoji: '\U0001F327\
        ',  mood: 'A gentle rain falling',    warm: 'Cozy rainy weather',         cold: 'Damp and cool',             glow:\
        \ 'rgba(150,180,220,0.28)' },\n    'pouring':         { emoji: '\U0001F327',  mood: 'Heavy rain coming down',  warm:\
        \ 'Stay dry — it\\'s pouring',   cold: 'Cold rain, bundle up',      glow: 'rgba(120,160,210,0.32)' },\n    'snowy':\
        \           { emoji: '\U0001F328',  mood: 'Snowflakes drifting down',warm: 'Light snow falling',         cold: 'Snowy\
        \ and cold',            glow: 'rgba(220,235,250,0.30)' },\n    'snowy-rainy':     { emoji: '\U0001F328',  mood: 'Wintry\
        \ mix outside',       warm: 'Sleet falling',              cold: 'Sleet and slush',           glow: 'rgba(190,210,230,0.28)'\
        \ },\n    'lightning':       { emoji: '⛈',  mood: 'Thunder rumbling',         warm: 'Storms rolling through',    \
        \ cold: 'Stormy and cold',           glow: 'rgba(180,170,220,0.32)' },\n    'lightning-rainy': { emoji: '⛈',  mood:\
        \ 'Thunder and heavy rain',   warm: 'Wild weather outside',       cold: 'Cold thunderstorms',        glow: 'rgba(180,170,220,0.32)'\
        \ },\n    'fog':             { emoji: '\U0001F32B',  mood: 'Soft foggy haze',          warm: 'Misty morning',    \
        \          cold: 'Foggy and cold',            glow: 'rgba(220,220,225,0.22)' },\n    'windy':           { emoji: '\U0001F4A8\
        ',  mood: 'Breeze blowing through',  warm: 'Windy but warm',             cold: 'Cold winds blowing',        glow:\
        \ 'rgba(200,220,235,0.22)' },\n    'windy-variant':   { emoji: '\U0001F4A8',  mood: 'Gusty out there',         warm:\
        \ 'Breezy and warm',            cold: 'Cold gusty wind',           glow: 'rgba(200,220,235,0.22)' },\n    'hail':\
        \            { emoji: '\U0001F9CA',  mood: 'Hail falling',             warm: 'Hailstorm — stay inside',    cold: 'Icy\
        \ hail outside',          glow: 'rgba(200,220,240,0.32)' },\n    'exceptional':     { emoji: '⚠️',  mood: 'Unusual\
        \ weather',          warm: 'Watch the skies',            cold: 'Unusual weather, careful',  glow: 'rgba(255,180,150,0.32)'\
        \ },\n  };\n  const c = condMap[condition] || { emoji: '\U0001F324', mood: condition, warm: condition, cold: condition,\
        \ glow: 'rgba(220,220,220,0.20)' };\n\n  // ── Activity hint ── (warm/cold cutoff at 65°F or 18°C)\n  const isWarm\
        \ = temp !== undefined && temp >= (tempUnit.includes('C') ? 18 : 65);\n  const isCold = temp !== undefined && temp\
        \ < (tempUnit.includes('C') ? 4 : 40);\n  let copy = isWarm ? c.warm : c.cold;\n\n  let hint = '';\n  if (condition\
        \ === 'sunny' && isWarm)            hint = 'Perfect for the patio \U0001F337';\n  else if (condition === 'sunny' &&\
        \ isCold)        hint = 'Bundle up if you go out';\n  else if (condition === 'partlycloudy' && isWarm) hint = 'Lovely\
        \ walk weather';\n  else if (condition === 'rainy' || condition === 'pouring')          hint = 'Snuggle weather \U0001F4D6\
        ';\n  else if (condition === 'snowy' || condition === 'snowy-rainy')      hint = 'Hot cocoa weather ☕';\n  else if\
        \ (condition === 'lightning' || condition === 'lightning-rainy') hint = 'Stay inside, light a candle \U0001F56F';\n\
        \  else if (condition === 'fog')                    hint = 'Drive carefully out there';\n  else if (condition ===\
        \ 'clear-night')            hint = 'Great night for stargazing ✨';\n  else if (isCold)                           \
        \       hint = 'Stay warm';\n\n  // ── Layout ──\n  return `\n    <div style=\"\n      position: relative;\n     \
        \ width: 100%; height: 100%;\n      padding: 22px 26px;\n      border-radius: 22px;\n      background: linear-gradient(160deg,\
        \ ${c.glow} 0%, rgba(28,22,30,0.6) 50%, rgba(15,12,20,0.78) 100%);\n      border: 1px solid rgba(255, 235, 215, 0.12);\n\
        \      backdrop-filter: blur(16px) saturate(150%);\n      box-shadow: 0 8px 32px rgba(0,0,0,0.35),\n             \
        \     inset 0 1px 0 rgba(255,255,255,0.06);\n      transition: all 0.8s ease-out;\n      overflow: hidden;\n    \"\
        >\n      <!-- top row: emoji + temp -->\n      <div style=\"display:flex; align-items:flex-start; gap:18px;\">\n \
        \       <div style=\"\n          font-size: 64px;\n          line-height: 1;\n          filter: drop-shadow(0 2px\
        \ 8px rgba(0,0,0,0.4));\n          ${(condition === 'sunny' || condition === 'clear-night') ? 'animation: gentleBreathe\
        \ 5s ease-in-out infinite;' : ''}\n        \">${c.emoji}</div>\n\n        <div style=\"flex:1; min-width:0;\">\n \
        \         <div style=\"display:flex; align-items:baseline; gap:6px;\">\n            <div style=\"\n              font-family:\
        \ 'Inter', sans-serif;\n              font-size: 56px;\n              font-weight: 200;\n              color: rgba(255,\
        \ 245, 230, 0.97);\n              line-height: 1;\n              letter-spacing: -0.02em;\n            \">${temp !==\
        \ undefined ? Math.round(temp) : '–'}<span style=\"font-size:28px; opacity:0.7;\">°</span></div>\n            ${apparent\
        \ !== undefined && Math.abs(apparent - temp) >= 2 ? `\n              <div style=\"\n                font-family: 'Inter',\
        \ sans-serif;\n                font-size: 13px;\n                color: rgba(255, 235, 215, 0.6);\n              \
        \  margin-left: 4px;\n              \">feels ${Math.round(apparent)}°</div>\n            ` : ''}\n          </div>\n\
        \n          <div style=\"\n            margin-top: 4px;\n            font-family: 'Caveat', 'Georgia', cursive;\n\
        \            font-style: italic;\n            font-size: 22px;\n            font-weight: 500;\n            color:\
        \ rgba(255, 230, 210, 0.92);\n            text-shadow: 0 1px 4px rgba(0,0,0,0.5);\n            line-height: 1.1;\n\
        \          \">${copy}</div>\n\n          ${hint ? `\n            <div style=\"\n              margin-top: 4px;\n \
        \             font-family: 'Caveat', 'Georgia', cursive;\n              font-style: italic;\n              font-size:\
        \ 16px;\n              color: rgba(255, 220, 200, 0.7);\n            \">${hint}</div>` : ''}\n        </div>\n   \
        \   </div>\n\n      <!-- bottom pill row -->\n      <div style=\"\n        margin-top: 18px;\n        display: flex;\
        \ flex-wrap: wrap; gap: 6px;\n        font-family: 'Inter', sans-serif;\n        font-size: 11px;\n        color:\
        \ rgba(255, 235, 215, 0.78);\n      \">\n        ${humidity !== undefined ? `<span style=\"\n          display:inline-flex;\
        \ align-items:center; gap:4px;\n          padding: 4px 10px; border-radius: 999px;\n          background: rgba(40,28,32,0.5);\n\
        \          border: 1px solid rgba(255,220,195,0.15);\n        \">\U0001F4A7 ${humidity}%</span>` : ''}\n        ${wind\
        \ !== undefined ? `<span style=\"\n          display:inline-flex; align-items:center; gap:4px;\n          padding:\
        \ 4px 10px; border-radius: 999px;\n          background: rgba(40,28,32,0.5);\n          border: 1px solid rgba(255,220,195,0.15);\n\
        \        \">\U0001F4A8 ${Math.round(wind)} ${speedUnit}</span>` : ''}\n        <span style=\"\n          display:inline-flex;\
        \ align-items:center; gap:4px;\n          padding: 4px 10px; border-radius: 999px;\n          background: rgba(40,28,32,0.5);\n\
        \          border: 1px solid rgba(255,220,195,0.15);\n        \">${isDay ? '\U0001F305 sets' : '\U0001F304 rises'}\
        \ ${isDay ? sunsetStr : sunriseStr}</span>\n        ${pressure !== undefined ? `<span style=\"\n          display:inline-flex;\
        \ align-items:center; gap:4px;\n          padding: 4px 10px; border-radius: 999px;\n          background: rgba(40,28,32,0.5);\n\
        \          border: 1px solid rgba(255,220,195,0.15);\n        \">\U0001F9ED ${Math.round(pressure)}</span>` : ''}\n\
        \      </div>\n\n      <!-- corner halo accent -->\n      <div style=\"\n        position:absolute; inset:0; border-radius:22px;\
        \ pointer-events:none;\n        background: radial-gradient(circle at 85% 20%, ${c.glow} 0%, transparent 55%);\n \
        \       opacity: 0.7;\n      \"></div>\n    </div>`;\n]]]\n"
    styles:
      card:
      - background: none
      - border: none
      - padding: 0
      - width: 100%
      - height: 200px
      - cursor: pointer
      custom_fields:
        body:
        - width: 100%
        - height: 100%
  tesla_tap_zone:
    variables:
      nav_path: /lovelace/tesla
    show_name: false
    show_icon: false
    tap_action:
      action: navigate
      navigation_path: '[[[ return variables.nav_path; ]]]'
    styles:
      card:
      - position: fixed
      - bottom: 0
      - left: 25vw
      - width: 50vw
      - height: 22vh
      - background: transparent
      - border: none
      - padding: 0
      - z-index: 4
