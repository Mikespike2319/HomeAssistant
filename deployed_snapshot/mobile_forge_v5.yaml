        '
      service: scene.turn_on
      service_data:
        entity_id: '[[[ return variables.scene_entity; ]]]'
    custom_fields:
      body: "[[[\n  const e = states[variables.light_entity];\n  if (!e) {\n    return `<div style=\"color:#888;font-size:12px;padding:14px;\"\
        >\n      ${variables.light_entity} not found\n    </div>`;\n  }\n  const on = e.state === 'on';\n  const bri = e.attributes.brightness\
        \ ? Math.round((e.attributes.brightness / 255) * 100) : 0;\n  const rgb = e.attributes.rgb_color;\n  const tempK =\
        \ e.attributes.color_temp_kelvin;\n  const friendly = (variables.cute_name || e.attributes.friendly_name || '').trim();\n\
        \  const emoji = variables.icon_emoji || '\U0001F4A1';\n\n  // ── Compute halo color for active state ──\n  let halo\
        \ = 'rgba(255, 200, 140, 0.35)';   // default warm\n  let bgGlow = 'rgba(255, 210, 165, 0.10)';\n  if (on && rgb)\
        \ {\n    halo = `rgba(${rgb[0]}, ${rgb[1]}, ${rgb[2]}, 0.45)`;\n    bgGlow = `rgba(${rgb[0]}, ${rgb[1]}, ${rgb[2]},\
        \ 0.14)`;\n  } else if (on && tempK) {\n    // map kelvin (2200=warm → 6500=cool) into RGB\n    const t = Math.min(Math.max((tempK\
        \ - 2200) / (6500 - 2200), 0), 1);\n    const r = Math.round(255 - t * 30);\n    const g = Math.round(200 + t * 40);\n\
        \    const b = Math.round(140 + t * 110);\n    halo = `rgba(${r}, ${g}, ${b}, 0.42)`;\n    bgGlow = `rgba(${r}, ${g},\
        \ ${b}, 0.12)`;\n  }\n\n  const display = on\n    ? `<div style=\"font-size:32px; font-weight:200; color:rgba(255,245,230,0.96);\
        \ line-height:1;\">${bri}<span style=\"font-size:16px; opacity:0.7;\">%</span></div>`\n    : `<div style=\"font-size:18px;\
        \ font-weight:300; color:rgba(255,235,215,0.55); line-height:1;\">off</div>`;\n\n  return `\n    <div style=\"\n \
        \     position:relative;\n      width:100%; height:100%;\n      padding:14px 14px 12px;\n      border-radius:18px;\n\
        \      background: ${on\n        ? `linear-gradient(160deg, ${bgGlow} 0%, rgba(30,22,28,0.55) 60%, rgba(20,15,22,0.65)\
        \ 100%)`\n        : `linear-gradient(160deg, rgba(35,30,38,0.55) 0%, rgba(20,17,24,0.7) 100%)`};\n      border: 1px\
        \ solid ${on ? halo.replace(/[\\d.]+\\)$/, '0.35)') : 'rgba(255,235,215,0.08)'};\n      backdrop-filter: blur(14px)\
        \ saturate(140%);\n      box-shadow: ${on ? `0 0 28px ${halo}, inset 0 1px 0 rgba(255,255,255,0.06)` : 'inset 0 1px\
        \ 0 rgba(255,255,255,0.04)'};\n      transition: all 0.6s ease-out;\n      overflow: hidden;\n      animation: ${on\
        \ ? 'gentleBreathe 5s ease-in-out infinite' : 'none'};\n    \">\n\n      <!-- emoji + name row -->\n      <div style=\"\
        display:flex; align-items:center; gap:8px; margin-bottom:10px;\">\n        <div style=\"\n          font-size:22px;\n\
        \          filter: ${on ? 'none' : 'grayscale(0.6) opacity(0.55)'};\n          transition: filter 0.6s;\n        \"\
        >${emoji}</div>\n        <div style=\"\n          font-family: 'Inter', sans-serif;\n          font-weight: 400;\n\
        \          font-size: 13px;\n          letter-spacing: 0.02em;\n          color: ${on ? 'rgba(255,235,215,0.92)' :\
        \ 'rgba(255,235,215,0.55)'};\n          white-space: nowrap;\n          overflow: hidden;\n          text-overflow:\
        \ ellipsis;\n        \">${friendly}</div>\n      </div>\n\n      ${display}\n\n      <!-- bottom subtle status -->\n\
        \      <div style=\"\n        margin-top: 8px;\n        font-family: 'Caveat', 'Georgia', cursive;\n        font-style:\
        \ italic;\n        font-size: 13px;\n        color: ${on ? 'rgba(255,225,205,0.7)' : 'rgba(255,235,215,0.35)'};\n\
        \      \">${on ? 'glowing' : 'resting'}</div>\n\n      <!-- inner halo accent when on -->\n      ${on ? `<div style=\"\
        \n        position:absolute; inset:0; border-radius:18px; pointer-events:none;\n        background: radial-gradient(circle\
        \ at 80% 20%, ${halo} 0%, transparent 55%);\n        opacity: 0.7;\n      \"></div>` : ''}\n    </div>`;\n]]]\n"
    styles:
