        \ states → friendly copy + accent\n  const stateMap = {\n    disarmed:        { label: 'Home & cozy',       sub: 'Nothing\
        \ watching',     emoji: '\U0001F3E1', color: '#a8d8b9', glow: 'rgba(168, 216, 185, 0.30)' },\n    armed_home:    \
