            '
        - height: '[[[ return states[''sun.sun''].state == ''above_horizon'' ? ''90px'' : ''80px''; ]]]

            '
        - filter: "[[[\n  const isDay = states['sun.sun'].state == 'above_horizon';\n  const brightness = isDay\n    ? \"\
            brightness(0.85) sepia(0.15) saturate(0.95) contrast(0.85) opacity(0.85)\"\n    : \"brightness(0.85) saturate(0.75)\
            \ opacity(0.9)\";\n  const shadow = isDay\n    ? \"drop-shadow(0px 0px 18px rgba(255,200,90,0.85))\"\n    : \"\
            drop-shadow(0px 0px 6px rgba(255,235,210,0.3))\";\n  return `${brightness} ${shadow}`;\n]]]\n"
        - bottom: "[[[\n  const ele = states['sun.sun'].attributes.elevation;\n  const isDay = states['sun.sun'].state ===\
            \ 'above_horizon';\n  let pct = isDay\n    ? Math.max(0, Math.min(ele/60, 1))\n    : Math.max(0, Math.min(Math.abs(ele)/35,\
            \ 1));\n  return (19 + (pct * 30)) + '%';\n]]]\n"
        - left: "[[[\n  const now = Date.now();\n  const nextSunrise = new Date(states['sun.sun'].attributes.next_rising).getTime();\n\
            \  const nextSunset  = new Date(states['sun.sun'].attributes.next_setting).getTime();\n  let progress;\n  if (states['sun.sun'].state\
            \ === 'above_horizon') {\n    const todaySunrise = nextSunrise - 24*60*60*1000;\n    progress = (now - todaySunrise)\
            \ / (nextSunset - todaySunrise);\n  } else {\n    const todaySunset = nextSunset - 24*60*60*1000;\n    progress\
            \ = (now - todaySunset) / (nextSunrise - todaySunset);\n  }\n  progress = Math.min(Math.max(progress, 0), 1);\n\
            \  const percent = 15 + (progress * 75);\n  return `calc(${percent}% - 110px)`;\n]]]\n"
        tree_layer:
