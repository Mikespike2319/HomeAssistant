          !important; backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); box-shadow: 0 18px 48px rgba(0,0,0,0.32)
          !important; padding-bottom: env(safe-area-inset-bottom, 0px); overflow: hidden; }

          '
button_card_templates:
  sky_system_tesla:
    variables:
      tesla_prefix: el_rocco
      wife_name: Kiara
      car_name: El Rocco
      wife_tracker: device_tracker.kiaras_iphone
    show_name: false
    show_icon: false
    extra_styles: "[[[\n  const isEditing = window.location.search.includes('edit=1') || window.location.pathname.includes('config');\n\
      \  if (isEditing) {\n    return `\n      #card { position: relative !important; height: 100px !important; background:\
      \ rgba(0,0,0,0.4) !important; border-radius: 12px; }\n      * { display: none !important; }\n    `;\n  }\n  return `\n\
      \    #card {\n      position: fixed !important;\n      top: 0; left: 0;\n      width: 100vw !important;\n      height:\
      \ 100vh !important;\n      z-index: 0;\n      pointer-events: none;\n    }\n\n    /* ── original sky animations ── */\n\
      \    @keyframes cloudFlow {\n      0%   { transform: translate(-20%, -2%); }\n      50%  { transform: translate(0%,\
      \ 0%); }\n      100% { transform: translate(-20%, -2%); }\n    }\n    @keyframes starTwinkle { 0%, 100% { opacity: 0.3;\
      \ } 50% { opacity: 0.8; } }\n    @keyframes snowFall {\n      0%   { transform: translateY(-10vh) translateX(0px); }\n\
      \      100% { transform: translateY(110vh) translateX(20px); }\n    }\n    @keyframes rainFall {\n      0%   { transform:\
      \ translateY(-20vh); }\n      100% { transform: translateY(110vh); }\n    }\n    @keyframes lightningFlash {\n     \
      \ 0%, 90%, 100% { background: transparent; }\n      92% { background: rgba(255,255,255,0.4); }\n      94% { background:\
      \ transparent; }\n      96% { background: rgba(255,255,255,0.7); }\n    }\n\n    /* ── new cozy animations ── */\n \
      \   @keyframes chargingPulse {\n      0%, 100% { opacity: 0.55; transform: scale(1.0); }\n      50%      { opacity:\
      \ 1.0;  transform: scale(1.08); }\n    }\n    @keyframes gentleBreathe {\n      0%, 100% { opacity: 0.85; }\n      50%\
      \      { opacity: 1.0; }\n    }\n    @keyframes hudFadeIn {\n      from { opacity: 0; transform: translateY(8px); }\n\
      \      to   { opacity: 1; transform: translateY(0); }\n    }\n    @keyframes floatHeart {\n      0%   { transform: translateY(0)\
      \ translateX(0) rotate(-5deg); opacity: 0; }\n      15%  { opacity: 0.9; }\n      85%  { opacity: 0.9; }\n      100%\
      \ { transform: translateY(-60vh) translateX(30px) rotate(15deg); opacity: 0; }\n    }\n\n    /* ── particle helpers\
      \ ── */\n    .snowflakes i, .rain-drops i {\n      position: fixed; background: white; top: -10px; pointer-events: none;\n\
      \    }\n    .snowflakes i { border-radius: 50%; animation: snowFall linear infinite; }\n    .rain-drops i { width: 1px;\
      \ height: 15px; opacity: 0.4; animation: rainFall linear infinite; }\n    .lightning-bolt {\n      position: fixed;\
      \ top: 0; left: 0; width: 100vw; height: 100vh;\n      animation: lightningFlash 5s infinite; z-index: 8;\n    }\n \
      \   .hearts span {\n      position: fixed;\n      font-size: 22px;\n      color: rgba(255, 180, 190, 0.9);\n      text-shadow:\
      \ 0 0 8px rgba(255, 200, 210, 0.6);\n      animation: floatHeart 8s ease-in infinite;\n      pointer-events: none;\n\
      \      user-select: none;\n    }\n\n    /* ── cozy HUD chrome ── */\n    .cozy-hud {\n      font-family: 'Inter', 'SF\
      \ Pro Display', -apple-system, sans-serif;\n      font-weight: 300;\n      color: rgba(255, 245, 235, 0.94);\n     \
      \ letter-spacing: 0.015em;\n      animation: hudFadeIn 0.7s ease-out;\n    }\n    .cozy-hud .greeting {\n      font-family:\
      \ 'Caveat', 'Dancing Script', 'Georgia', cursive;\n      font-style: italic;\n      font-weight: 400;\n      font-size:\
      \ 22px;\n      color: rgba(255, 222, 200, 0.95);\n      text-shadow: 0 1px 4px rgba(0,0,0,0.4);\n      letter-spacing:\
      \ 0.02em;\n      margin-bottom: 6px;\n      animation: gentleBreathe 6s ease-in-out infinite;\n    }\n    .cozy-hud\
      \ .soc-row {\n      display: flex; align-items: center; justify-content: center;\n      gap: 12px;\n    }\n    .cozy-hud\
      \ .soc-num {\n      font-size: 32px; font-weight: 200;\n      color: rgba(255, 240, 225, 0.96);\n      text-shadow:\
      \ 0 1px 6px rgba(0,0,0,0.4);\n    }\n    .cozy-hud .battery-shell {\n      position: relative;\n      width: 110px;\
      \ height: 20px;\n      border: 1.5px solid rgba(255, 220, 195, 0.65);\n      border-radius: 6px;\n      background:\
      \ rgba(20, 18, 25, 0.45);\n    }\n    .cozy-hud .battery-shell::after {\n      content: ''; position: absolute;\n  \
      \    top: 5px; right: -5px; width: 3px; height: 10px;\n      background: rgba(255, 220, 195, 0.65); border-radius: 0\
      \ 2px 2px 0;\n    }\n    .cozy-hud .battery-fill {\n      position: absolute; top: 2px; left: 2px; bottom: 2px;\n  \
      \    background: linear-gradient(90deg, #ffd6a8 0%, #ff9e7a 100%);\n      border-radius: 4px;\n      transition: width\
      \ 1.4s ease-out;\n      box-shadow: 0 0 8px rgba(255, 180, 140, 0.4);\n    }\n    .cozy-hud .battery-fill.low    { background:\
      \ linear-gradient(90deg, #ffb8a3, #ff8a6a); }\n    .cozy-hud .battery-fill.crit   { background: linear-gradient(90deg,\
      \ #ff9a8a, #f06b5a); }\n    .cozy-hud .battery-fill.charge {\n      background: linear-gradient(90deg, #ffe0b8, #ffba9c,\
      \ #ffd9c4);\n      background-size: 200% 100%;\n      animation: chargingPulse 2s ease-in-out infinite;\n    }\n   \
      \ .cozy-hud .status-line {\n      font-family: 'Caveat', 'Dancing Script', 'Georgia', cursive;\n      font-style: italic;\n\
      \      font-size: 17px;\n      color: rgba(255, 230, 215, 0.85);\n      margin-top: 8px;\n      text-shadow: 0 1px 3px\
      \ rgba(0,0,0,0.35);\n    }\n    .cozy-hud .pill-row {\n      display: flex; flex-wrap: wrap; gap: 6px;\n      justify-content:\
      \ center;\n      margin-top: 10px;\n    }\n    .cozy-hud .pill {\n      display: inline-flex; align-items: center; gap:\
      \ 5px;\n      padding: 5px 11px;\n      background: rgba(40, 28, 32, 0.5);\n      border: 1px solid rgba(255, 220, 195,\
      \ 0.18);\n      border-radius: 999px;\n      backdrop-filter: blur(14px) saturate(150%);\n      font-size: 12px;\n \
      \     font-weight: 300;\n      color: rgba(255, 235, 220, 0.88);\n    }\n    .cozy-hud .pill .icon { font-size: 13px;\
      \ opacity: 0.9; }\n\n    @media (orientation: landscape) {\n      #tree_layer, #sky_atmosphere, #weather_overlay,\n\
      \      #car_layer, #sky_layer, #lamp_layer, #driveway_layer,\n      #wet_driveway, #celestial_body, #greeting_layer,\n\
      \      #heart_particles { display: none !important; }\n      #sky_atmosphere { display: block !important; }\n      #tesla_hud\
      \ { display: block !important; }\n    }\n  `;\n]]]\n"
    custom_fields:
      background_base: "[[[\n  const isDay = states['sun.sun'].state === 'above_horizon';\n  const grad = isDay\n    ? `radial-gradient(ellipse\
        \ at 50% 100%,\n        rgba(255, 220, 195, 0.06) 0%,\n        rgba(40, 30, 35, 0.5) 60%,\n        rgba(20, 18, 25,\
        \ 0.92) 100%), #0e0c12`\n    : `radial-gradient(ellipse at 50% 90%,\n        rgba(255, 195, 160, 0.08) 0%,\n     \
        \   rgba(50, 30, 45, 0.55) 50%,\n        rgba(15, 12, 22, 0.96) 100%), #08070d`;\n  return `<div style=\"width:100%;\
        \ height:100%; background:${grad};\"></div>`;\n]]]\n"
      sky_atmosphere: '[[[ return `<div></div>`; ]]]'
      blur_overlay: ' '
      sky_layer: "[[[\n  const sun = states['sun.sun'];\n  const ele = sun.attributes.elevation;\n  const isDay = sun.state == 'above_horizon';\n  const weather = states['weather.forecast_home'].state.toLowerCase();\n\n  if (isDay && (weather.includes('sunny') || weather.includes('clear'))) {\n    return `<div></div>`;\n  }\n  if (isDay) {\n    let brightPct = 0.5 + (Math.min(ele / 35, 1) * 0.3);\n    let sepia = (1 - Math.min(ele / 15, 1)) * 0.3;\n    return `<img src=\"/local/sky/clouds-real.png?v=3\"\n      style=\"width:150vw; object-fit:contain; opacity:0.7;\n             filter: brightness(${brightPct}) saturate(0.75) sepia(${sepia});\n             animation: cloudFlow 90s infinite linear;\n             transition: filter 5s ease-in-out;\">`;\n  }\n  let starBright = 0.5 + (Math.min(Math.abs(ele) / 35, 1) * 0.5);\n  return `<img src=\"/local/sky/stars_v2.png?v=2\"\n    style=\"width:100vw; opacity:0.9;\n           filter: brightness(${starBright}) sepia(1) saturate(5) hue-rotate(10deg);\n           animation: starTwinkle 15s infinite ease-in-out;\n           transition: filter 15s ease-in-out;\">`;\n]]]\n"
      celestial_body: "[[[\n  const isDay = states['sun.sun'].attributes.elevation > -1.0;\n  if (isDay) {\n    return `\n      <div style=\"position:relative; width:220px; height:220px;\">\n        <div style=\"\n          position:absolute; top:50%; left:50%;\n          width:70px; height:70px;\n          transform: translate(-50%, -50%);\n          border-radius: 50%;\n          background: radial-gradient(circle,\n            rgba(255,248,214,1) 0%,\n            rgba(255,224,138,0.95) 35%,\n            rgba(255,201,77,0.75) 60%,\n            rgba(255,179,0,0.55) 75%,\n            rgba(255,160,0,0.35) 85%,\n            rgba(20,40,70,0.8) 95%,\n            rgba(20,40,70,0) 100%);\n          box-shadow:\n            0 0 20px 10px rgba(255,200,80,0.35),\n            0 0 45px 25px rgba(255,180,60,0.22),\n            0 0 80px 45px rgba(255,150,40,0.12);\n        \"></div>\n      </div>`;\n  }\n  return `\n    <div style=\"position:relative; width:220px; height:220px; overflow:visible;\n      background: radial-gradient(circle,\n        rgba(255,230,150,0.20) 0%,\n        rgba(255,220,140,0.14) 20%,\n        rgba(255,200,120,0.09) 25%,\n        rgba(255,180,100,0.02) 38%,\n        transparent 40%);\n      -webkit-mask-image: radial-gradient(circle at 75% 35%, transparent 40%, black 41%);\n      mask-image: radial-gradient(circle at 76% 40%, transparent 20%, black 32%);\">\n      <div style=\"\n        position:absolute; top:50%; left:50%;\n        width:70px; height:70px; overflow:visible;\n        filter: blur(5px);\n        transform: translate(-50%, -50%);\n        border-radius: 50%;\n        background: radial-gradient(circle,\n          rgba(255,240,170,0.95) 0%,\n          rgba(250,225,150,0.8) 35%,\n          rgba(235,210,130,0.6) 65%,\n          rgba(210,190,110,0.4) 85%,\n          rgba(12,18,35,0.15) 95%,\n          rgba(12,18,35,0) 100%);\n        -webkit-mask-image: radial-gradient(circle at 85% 45%, transparent 45%, black 46%);\n        mask-image: radial-gradient(circle at 85% 35%, transparent 45%, black 46%);\n      \"></div>\n    </div>`;\n]]]\n"
      tree_layer: "[[[\n  const now = new Date();\n  const month = now.getMonth() + 1;\n  const day = now.getDate();\n  let image = \"/local/bottom_overlays/New/trees/trees.png\";\n  if ((month === 9 && day >= 1) || (month === 10)) image = \"/local/bottom_overlays/New/trees/trees-autumn.png\";\n  else if (month === 11) image = \"/local/bottom_overlays/New/trees/trees-snow1.png\";\n  else if (month === 12) image = \"/local/bottom_overlays/New/trees/trees-christmas.png\";\n  else if ((month === 1) || (month === 2) || (month === 3 && day <= 1)) image = \"/local/bottom_overlays/New/trees/trees-snow2.png\";\n  let filter = \"brightness(1.05) sepia(0.18) saturate(1.6)\";\n  if (states['sun.sun'].state != 'above_horizon') filter = \"brightness(0.9) sepia(0.25) saturate(1.3) contrast(0.95)\";\n  return `<img src=\"${image}\" style=\"width:100%; height:100%; object-fit:cover; filter:${filter}; transition: filter 5s ease-in-out;\">`;\n]]]\n"
      weather_overlay: "[[[\n  const state = states['weather.forecast_home'].state.toLowerCase();\n  let content = '';\n  if (['snow','sleet','hail','snowy','ice'].some(t => state.includes(t))) {\n    content += '<div class=\"snowflakes\">';\n    const count = state.includes('heavy') ? 40 : 20;\n    for (let i=0;i<count;i++) {\n      content += `<i style=\"left:${Math.random()*100}%; width:${Math.random()*3+2}px; height:${Math.random()*3+2}px; animation-duration:${Math.random()*5+5}s; animation-delay:-${Math.random()*10}s; opacity:${Math.random()*0.6+0.2};\"></i>`;\n    }\n    content += '</div>';\n  }\n  if (['rain','pouring','drizzle','thunderstorm','lightning'].some(t => state.includes(t))) {\n    content += '<div class=\"rain-drops\">';\n    const count = (state.includes('heavy')||state.includes('pouring')||state.includes('thunderstorm')) ? 60 : 30;\n    for (let i=0;i<count;i++) {\n      content += `<i style=\"left:${Math.random()*100}%; animation-duration:${Math.random()*0.5+0.5}s; animation-delay:-${Math.random()*2}s;\"></i>`;\n    }\n    content += '</div>';\n  }\n  if (state.includes('lightning') || state.includes('thunderstorm')) {\n    content += '<div class=\"lightning-bolt\"></div>';\n  }\n  if (['fog','mist','smoke','haze','dust'].some(t => state.includes(t))) {\n    content += `<div style=\"position:fixed; width:100vw; height:100dvh; background: rgba(200,200,220,0.2); backdrop-filter: blur(1px); z-index:8;\"></div>`;\n  }\n  if (['cloudy','overcast','partlycloudy'].some(t => state.includes(t))\n      && states['sun.sun'].state !== 'above_horizon') {\n    content += `<img src=\"/local/sky/clouds-real.png?v=3\"\n      style=\"position:fixed; top:0; left:0; width:130vw; height:80vh; object-fit:cover;\n             opacity:0.35; filter: brightness(0.6) contrast(0.85) saturate(0.6) hue-rotate(-5deg);\n             animation: cloudFlow 90s infinite linear; z-index:3;\">`;\n  }\n  return content;\n]]]\n"
      greeting_layer: "[[[\n  const name = (variables.wife_name || '').trim();\n  const tracker = (variables.wife_tracker || '').trim();\n  const hr = new Date().getHours();\n\n  // ── Phase 5: geo-aware welcome ──\n  // If her tracker just arrived home (within 10 min), override\n  // the time-of-day greeting with a warm welcome.\n  let justArrived = false;\n  if (tracker && states[tracker]) {\n    const t = states[tracker];\n    if (t.state === 'home') {\n      const sinceChange = Date.now() - new Date(t.last_changed).getTime();\n      if (sinceChange < 10 * 60 * 1000) justArrived = true;\n    }\n  }\n\n  let greeting, emoji;\n  if (justArrived) {\n    greeting = 'Welcome home';\n    emoji = '\U0001F3E1';\n  } else if (hr >= 5  && hr < 9)  { greeting = 'Good morning';     emoji = '☕'; }\n  else if (hr >= 9  && hr < 12)   { greeting = 'Hi there';          emoji = '✨'; }\n  else if (hr >= 12 && hr < 17)   { greeting = 'Good afternoon';    emoji = '\U0001F337'; }\n  else if (hr >= 17 && hr < 20)   { greeting = 'Welcome home';      emoji = '\U0001F3E1'; }\n  else if (hr >= 20 && hr < 23)   { greeting = 'Cozy evening';      emoji = '\U0001F319'; }\n  else                            { greeting = 'Sweet dreams';      emoji = '\U0001F4AB'; }\n\n  const line = name ? `${greeting}, ${name}  ${emoji}` : `${greeting}  ${emoji}`;\n  return `\n    <div style=\"\n      font-family: 'Caveat', 'Dancing Script', 'Georgia', cursive;\n      font-style: italic;\n      font-size: 28px;\n      font-weight: 500;\n      color: rgba(255, 225, 200, 0.92);\n      text-shadow: 0 2px 8px rgba(0,0,0,0.5);\n      letter-spacing: 0.03em;\n      animation: gentleBreathe 7s ease-in-out infinite;\n      text-align: center;\n    \">${line}</div>`;\n]]]\n"
      car_layer: "[[[\n  const prefix = variables.tesla_prefix;\n  const isDay = states['sun.sun'].state === 'above_horizon';\n  const get = (eid) => states[eid] ? states[eid].state : null;\n  // Probes BOTH tesla_custom variants (older _charger, newer _charge_cable)\n  const tryGet = (...eids) => { for (const e of eids) { const v = get(e); if (v !== null) return v; } return null; };\n\n  const isCharging = tryGet(`binary_sensor.${prefix}_charger`, `binary_sensor.${prefix}_charge_cable`) === 'on'\n                   || get(`sensor.${prefix}_charging`) === 'Charging';\n  const weather = states['weather.forecast_home'].state.toLowerCase();\n  const isWet = ['rain','pouring','drizzle','thunderstorm'].some(t => weather.includes(t));\n  const isSnowy = ['snow','sleet','snowy'].some(t => weather.includes(t));\n\n  // Priority: weather > charging > day/night\n  let img;\n  if (isSnowy)         img = \"/local/tesla/car/model_y_snow.png\";\n  else if (isWet)      img = \"/local/tesla/car/model_y_wet.png\";\n  else if (isCharging) img = isDay\n                        ? \"/local/tesla/car/model_y_charging_day.png\"\n                        : \"/local/tesla/car/model_y_charging_night.png\";\n  else                 img = isDay\n                        ? \"/local/tesla/car/model_y_day.png\"\n                        : \"/local/tesla/car/model_y_night.png\";\n\n  // Charge port glow — soft warm gold instead of green for cozy feel\n  const chargeGlow = isCharging ? `\n    <div style=\"\n      position:absolute; bottom:18%; right:32%;\n      width:60px; height:60px;\n      border-radius:50%;\n      background: radial-gradient(circle,\n        rgba(255, 200, 140, 0.5) 0%,\n        rgba(255, 170, 110, 0.28) 40%,\n        transparent 75%);\n      filter: blur(6px);\n      animation: chargingPulse 1.8s ease-in-out infinite;\n      pointer-events: none;\n    \"></div>` : '';\n\n  // Night ambient glow — warm peach instead of cool blue\n  const underGlow = !isDay ? `\n    <div style=\"\n      position:absolute; bottom:6%; left:15%; right:15%; height:42px;\n      background: radial-gradient(ellipse at center,\n        rgba(255, 200, 160, 0.22) 0%,\n        rgba(255, 170, 130, 0.10) 50%,\n        transparent 80%);\n      filter: blur(8px);\n      pointer-events: none;\n    \"></div>` : '';\n\n  return `\n    <div style=\"position:relative; width:100%; height:100%;\">\n      ${underGlow}\n      ${chargeGlow}\n      <img src=\"${img}\" style=\"\n        width:100%; height:100%; object-fit:contain;\n        opacity:0.98;\n        filter: ${isDay\n          ? \"brightness(1.02) saturate(1.05) contrast(1.03)\"\n          : \"brightness(0.88) saturate(1.08) contrast(1.08)\"};\n        transition: all 2s ease-in-out;\n      \">\n    </div>`;\n]]]\n"
      lamp_layer: "[[[\n  const isDay = states['sun.sun'].state === 'above_horizon';\n  const now = new Date();\n  const month = now.getMonth() + 1;\n  const day = now.getDate();\n  let img;\n  if (month === 10 && day >= 15) {\n    img = isDay ? \"/local/bottom_overlays/New/lamp/lamp-halloween_off.png\"\n                : \"/local/bottom_overlays/New/lamp/lamp-halloween_on.png\";\n  } else if ((month === 11) || (month === 12) || (month === 1) || (month === 2) || (month === 3 && day <= 1)) {\n    img = isDay ? \"/local/bottom_overlays/New/lamp/lamp-snow_off.png\"\n                : \"/local/bottom_overlays/New/lamp/lamp-snow_on.png\";\n  } else {\n    img = isDay ? \"/local/bottom_overlays/New/lamp/lamp_off.png\"\n                : \"/local/bottom_overlays/New/lamp/lamp_on.png\";\n  }\n  return `\n    <div style=\"position:relative; width:100%; height:100%;\">\n      ${!isDay ? `\n        <div style=\"\n          position:absolute; top:20%; left:50%;\n          width:160px; height:160px;\n          filter: blur(10px) brightness(1.15);\n          transform: translate(-50%, -50%);\n          border-radius: 50%;\n          pointer-events: none;\n          background: radial-gradient(circle,\n            rgba(255, 215, 130, 0.42) 0%,\n            rgba(255, 200, 105, 0.25) 30%,\n            rgba(255, 180, 85, 0.12) 55%,\n            rgba(255, 160, 65, 0.06) 75%,\n            transparent 90%);\n        \"></div>` : ''}\n      <img src=\"${img}\" style=\"\n        width:100%; height:100%; object-fit:contain;\n        opacity:0.95;\n        filter: ${isDay ? \"brightness(0.92) saturate(0.6)\" : \"brightness(0.98) saturate(1.05)\"};\n        transition: all 2s ease-in-out;\n      \">\n    </div>`;\n]]]\n"
      wet_driveway: "[[[\n  const weather = states['weather.forecast_home'].state.toLowerCase();\n  const isWet = ['rain','pouring','drizzle','thunderstorm'].some(t => weather.includes(t));\n  if (!isWet) return '';\n  const isHeavy = weather.includes('pouring') || weather.includes('thunderstorm');\n  return `\n    <div style=\"\n      position: relative; width: 100%; height: 100%;\n      overflow: hidden;\n    \">\n      <!-- wet sheen base -->\n      <div style=\"\n        position: absolute; inset: 0;\n        background: linear-gradient(180deg,\n          transparent 0%,\n          rgba(180, 200, 220, 0.06) 30%,\n          rgba(140, 170, 200, 0.18) 70%,\n          rgba(100, 140, 180, 0.28) 100%);\n        opacity: ${isHeavy ? 0.95 : 0.7};\n      \"></div>\n      <!-- streaky horizontal reflection lines -->\n      <div style=\"\n        position: absolute; inset: 0;\n        background: repeating-linear-gradient(180deg,\n          transparent 0px, transparent 3px,\n          rgba(255,255,255,0.04) 3px, rgba(255,255,255,0.04) 4px);\n        opacity: ${isHeavy ? 0.6 : 0.35};\n        mix-blend-mode: overlay;\n      \"></div>\n      <!-- subtle puddle highlight under car center -->\n      <div style=\"\n        position: absolute; bottom: 0; left: 35%; right: 35%; height: 80%;\n        background: radial-gradient(ellipse at center bottom,\n          rgba(255, 255, 255, 0.18) 0%,\n          rgba(220, 230, 245, 0.08) 30%,\n          transparent 70%);\n        filter: blur(6px);\n      \"></div>\n    </div>`;\n]]]\n"
      driveway_layer: "[[[\n  return `<div style=\"\n    width:100%; height:100%;\n    background-image: url('/local/tesla/driveway_base.png');\n    background-size: cover;\n    background-position: bottom;\n    filter: brightness(0.85) saturate(0.95) contrast(0.95);\n  \"></div>`;\n]]]\n"
      heart_particles: "[[[\n  const prefix = variables.tesla_prefix;\n  const tracker = (variables.wife_tracker || '').trim();\n  const get = (eid) => states[eid] ? states[eid].state : null;\n  const since = (eid) => states[eid] ? Date.now() - new Date(states[eid].last_changed).getTime() : Infinity;\n\n  // ── Phase 5: timing-aware happy moments ──\n  // Hearts only emit for a window AFTER the moment, then fade.\n  const FIVE_MIN = 5 * 60 * 1000;\n  const TEN_MIN = 10 * 60 * 1000;\n\n  // 1. Charge JUST completed (last 5 min)\n  const chargingState = get(`sensor.${prefix}_charging`);\n  const chargeJustDone = (chargingState === 'Complete' || chargingState === 'Charging Complete')\n                        && since(`sensor.${prefix}_charging`) < FIVE_MIN;\n\n  // 2. Climate just turned on (last 5 min) — pre-conditioned cabin\n  const climateOn = get(`binary_sensor.${prefix}_climate`) === 'on'\n                  || ['heat','cool','heat_cool','auto'].includes(get(`climate.${prefix}_climate`));\n  const climateRefEntity = states[`binary_sensor.${prefix}_climate`] ? `binary_sensor.${prefix}_climate` : `climate.${prefix}_climate`;\n  const climateJustOn = climateOn && since(climateRefEntity) < FIVE_MIN;\n\n  // 3. Wife just arrived home (last 10 min)\n  const justArrived = tracker && states[tracker]\n                    && states[tracker].state === 'home'\n                    && since(tracker) < TEN_MIN;\n\n  if (!chargeJustDone && !climateJustOn && !justArrived) return '';\n\n  // Bigger burst for charge-done celebration, gentle for the others\n  const count = chargeJustDone ? 8 : justArrived ? 10 : 3;\n  let hearts = '<div class=\"hearts\">';\n  for (let i = 0; i < count; i++) {\n    const left = 30 + Math.random() * 40;\n    const delay = Math.random() * (chargeJustDone || justArrived ? 3 : 6);\n    const dur = (chargeJustDone || justArrived ? 5 : 7) + Math.random() * 4;\n    const size = 18 + Math.random() * 14;\n    hearts += `<span style=\"\n      left:${left}%; bottom: 18vh;\n      font-size:${size}px;\n      animation-delay:-${delay}s;\n      animation-duration:${dur}s;\">❤</span>`;\n  }\n  hearts += '</div>';\n  return hearts;\n]]]\n"
      tesla_hud: "[[[\n  const prefix = variables.tesla_prefix;\n  const carName = variables.car_name || 'the car';\n  const get = (eid) => states[eid] ? states[eid].state : null;\n  const num = (eid) => {\n    const v = get(eid); const n = parseFloat(v);\n    return isNaN(n) ? null : n;\n  };\n  // Probes multiple variants — handles both old + new tesla_custom naming\n  const tryGet = (...eids) => { for (const e of eids) { const v = get(e); if (v !== null) return v; } return null; };\n  const tryNum = (...eids) => { for (const e of eids) { const n = num(e); if (n !== null) return n; } return null; };\n  const attr = (eid, a) => states[eid] && states[eid].attributes ? states[eid].attributes[a] : null;\n\n  // ── State probes (with naming-variant fallbacks) ──\n  const soc       = Math.round(tryNum(`sensor.${prefix}_battery`, `sensor.${prefix}_battery_level`) ?? 0);\n  const range     = Math.round(tryNum(`sensor.${prefix}_battery_range`) ?? 0);\n  const inside    = tryNum(`sensor.${prefix}_inside_temp`, `sensor.${prefix}_inside_temperature`);\n  const outside   = tryNum(`sensor.${prefix}_outside_temp`, `sensor.${prefix}_outside_temperature`);\n  const isLocked  = tryGet(`lock.${prefix}_doors`, `lock.${prefix}_lock`) === 'locked';\n  // Aggregate door-open state from any of the 4 individual door binary_sensors\n  const doorOpen  = ['front_driver','front_passenger','rear_driver','rear_passenger']\n                      .some(d => get(`binary_sensor.${prefix}_${d}_door`) === 'on')\n                  || get(`binary_sensor.${prefix}_doors`) === 'on';\n  const isCharging= tryGet(`binary_sensor.${prefix}_charger`, `binary_sensor.${prefix}_charge_cable`) === 'on';\n  const chState   = get(`sensor.${prefix}_charging`);\n  const ttFull    = num(`sensor.${prefix}_time_to_full_charge`);\n  const climateOn = get(`binary_sensor.${prefix}_climate`) === 'on'\n                  || ['heat','cool','heat_cool','auto'].includes(get(`climate.${prefix}_climate`));\n  const sentry    = get(`switch.${prefix}_sentry_mode`) === 'on';\n  const online    = tryGet(`binary_sensor.${prefix}_online`, `binary_sensor.${prefix}_status`) !== 'off';\n\n  // ── Friendly status sentence ── conversational, never technical\n  let status;\n  if (!online) {\n    status = `${carName} is napping`;\n  } else if (doorOpen) {\n    status = 'A door is open — peek out?';\n  } else if (isCharging && ttFull && ttFull > 0) {\n    const done = new Date(Date.now() + ttFull * 3600 * 1000);\n    const hh = done.getHours() % 12 || 12;\n    const mm = String(done.getMinutes()).padStart(2, '0');\n    const ampm = done.getHours() >= 12 ? 'PM' : 'AM';\n    status = `Charging gently · full by ${hh}:${mm} ${ampm}`;\n  } else if (isCharging) {\n    status = 'Sipping electrons ⚡';\n  } else if (chState === 'Complete' || chState === 'Charging Complete') {\n    status = 'All charged up and ready \U0001F4AB';\n  } else if (climateOn) {\n    status = 'Toasty inside, ready when you are';\n  } else if (soc >= 70) {\n    status = 'Plenty of juice for tomorrow';\n  } else if (soc >= 40) {\n    status = `Holding steady at ${soc}%`;\n  } else if (soc >= 20) {\n    status = 'Could use a charge soon ☕';\n  } else {\n    status = `Running low — let's plug ${carName} in`;\n  }\n\n  // ── Battery bar fill class ──\n  const fillClass = isCharging ? 'charge' : (soc < 15 ? 'crit' : soc < 30 ? 'low' : '');\n\n  // ── Pills: kept short, friendly, emoji-led ──\n  const pills = [];\n  if (inside !== null) pills.push({ icon: '\U0001F321', text: `${Math.round(inside)}° inside` });\n  if (outside !== null && Math.abs(outside - (inside || outside)) > 5)\n    pills.push({ icon: '\U0001F343', text: `${Math.round(outside)}° out` });\n  pills.push({ icon: isLocked ? '\U0001F512' : '\U0001F513', text: isLocked ? 'All buttoned up' : 'Unlocked' });\n  if (sentry) pills.push({ icon: '\U0001F441', text: 'Keeping watch' });\n  if (range)  pills.push({ icon: '\U0001F6E3', text: `${range} mi` });\n\n  const pillHtml = pills.map(p =>\n    `<span class=\"pill\"><span class=\"icon\">${p.icon}</span>${p.text}</span>`\n  ).join('');\n\
        \n  return `\n    <div class=\"cozy-hud\" style=\"display:flex; flex-direction:column; align-items:center; gap:4px;\">\n      <div class=\"soc-row\">\n        <div class=\"battery-shell\" title=\"State of charge\">\n          <div class=\"battery-fill ${fillClass}\" style=\"width:${soc}%;\"></div>\n        </div>\n        <div class=\"soc-num\">${soc}%</div>\n      </div>\n      <div class=\"status-line\">${status}</div>\n      <div class=\"pill-row\">${pillHtml}</div>\n    </div>`;\n]]]\n"
