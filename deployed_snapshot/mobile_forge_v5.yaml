      - pointer-events: auto
  sky_system:
    show_name: false
    show_icon: false
    extra_styles: "[[[\n  const isEditing = window.location.search.includes('edit=1') || window.location.pathname.includes('config');\n\
      \  if (isEditing) {\n    return `\n      #card {\n        position: relative !important;\n        height: 100px !important;\n\
      \        background: rgba(0,0,0,0.4) !important;\n        border-radius: 12px;\n      }\n      * {\n        display:\
      \ none !important;\n      }\n    `;\n  } else {\n    return `\n      #card {\n        position: fixed !important;\n\
      \        top: 0; left: 0;\n        width: 100vw !important;\n        height: 100dvh !important;\n        z-index: 0;\n\
      \        pointer-events: none;\n      }\n      @keyframes cloudFlow {\n        0%   { transform: translate(-20%, -2%);\
      \ }\n        50%  { transform: translate(0%, 0%); }\n        100% { transform: translate(-20%, -2%); }\n      }\n  \
      \    @keyframes starTwinkle { 0%, 100% { opacity: 0.3; } 50% { opacity: 0.8; } }\n      @keyframes snowFall {\n    \
      \    0% { transform: translateY(-10vh) translateX(0px); }\n        100% { transform: translateY(110vh) translateX(20px);\
      \ }\n      }\n      @keyframes rainFall {\n        0% { transform: translateY(-20vh); }\n        100% { transform: translateY(110vh);\
      \ }\n      }\n      @keyframes lightningFlash {\n        0%, 90%, 100% { background: transparent; }\n        92% { background:\
      \ rgba(255,255,255,0.4); }\n        94% { background: transparent; }\n        96% { background: rgba(255,255,255,0.7);\
      \ }\n      }\n      .snowflakes i, .rain-drops i {\n        position: fixed;\n        background: white;\n        top:\
      \ -10px;\n        pointer-events: none;\n      }\n      .snowflakes i {\n        border-radius: 50%;\n        animation:\
      \ snowFall linear infinite;\n      }\n      .rain-drops i {\n        width: 1px;\n        height: 15px;\n        opacity:\
      \ 0.4;\n        animation: rainFall linear infinite;\n      }\n      .lightning-bolt {\n        position: fixed;\n \
      \       top: 0;\n        left: 0;\n        width: 100vw;\n        height: 100dvh;\n        animation: lightningFlash\
      \ 5s infinite;\n        z-index: 7;\n      }\n      @media (orientation: landscape) {\n        #tree_layer, #sky_atmosphere,\
      \ #weather_overlay, #lamp_layer, #sky_layer, #wall_bottom, #celestial_body { display: none !important; }\n        #sky_atmosphere\
      \ { display: block !important; }\n      }\n    `;\n  }\n]]]\n"
    custom_fields:
      blur_overlay: ' '
      wall_bottom: ' '
      lamp_layer: "[[[\n  const isDay = states['sun.sun'].state === 'above_horizon';\n\n  const now = new Date();\n  const month = now.getMonth() + 1;\n  const day = now.getDate();\n\n  let img;\n\n  if (month === 10 && day >= 15) {\n    img = isDay\n      ? \"/local/bottom_overlays/New/lamp/lamp-halloween_off.png\"\n      : \"/local/bottom_overlays/New/lamp/lamp-halloween_on.png\";\n  }\n\n  else if (\n    (month === 11) ||\n    (month === 12) ||\n    (month === 1) ||\n    (month === 2) ||\n    (month === 3 && day <= 1)\n  ) {\n    img = isDay\n      ? \"/local/bottom_overlays/New/lamp/lamp-snow_off.png\"\n      : \"/local/bottom_overlays/New/lamp/lamp-snow_on.png\";\n  }\n\n  else {\n    img = isDay\n      ? \"/local/bottom_overlays/New/lamp/lamp_off.png\"\n      : \"/local/bottom_overlays/New/lamp/lamp_on.png\";\n  }\n\n  return `\n    <div style=\"\n      position: relative;\n      width: 100%;\n      height: 100%;\n    \">\n\n      ${!isDay ? `\n        <div style=\"\n          position: absolute;\n          top: 20%;\n          left: 50%;\n          width: 140px;\n          height: 140px;\n          filter: blur(10px) brightness(1.1);\n          transform: translate(-50%, -50%);\n          border-radius: 50%;\n          pointer-events: none;\n\n          background: radial-gradient(circle,\n            rgba(255, 210, 120, 0.35) 0%,\n            rgba(255, 200, 100, 0.2) 30%,\n            rgba(255, 180, 80, 0.1) 55%,\n            rgba(255, 160, 60, 0.05) 75%,\n            transparent 90%\n          );\n        \"></div>\n      ` : \"\"}\n\n      <img src=\"${img}\" style=\"\n        width: 100%;\n        height: 100%;\n        object-fit: contain;\n\n        opacity: 0.95;\n\n        filter: ${isDay\n          ? \"brightness(0.9) saturate(0.4)\"\n          : \"brightness(0.95) saturate(1.0)\"};\n\n        transition: all 2s ease-in-out;\n      \">\n    </div>\n  `;\n]]]\n"
      weather_overlay: "[[[\n  const state = states['weather.forecast_home'].state.toLowerCase();\n  let content = '';\n\n  if (['snow', 'sleet', 'hail', 'snowy', 'ice'].some(term => state.includes(term))) {\n    content += '<div class=\"snowflakes\">';\n    const count = state.includes('heavy') ? 40 : 20;\n    for (let i = 0; i < count; i++) {\n      content += `<i style=\"left: ${Math.random()*100}%; width: ${Math.random()*3+2}px; height: ${Math.random()*3+2}px; animation-duration: ${Math.random()*5+5}s; animation-delay: -${Math.random()*10}s; opacity: ${Math.random()*0.6+0.2};\"></i>`;\n    }\n    content += '</div>';\n  }\n\n  if (['rain', 'pouring', 'drizzle', 'thunderstorm', 'lightning'].some(term => state.includes(term))) {\n    content += '<div class=\"rain-drops\">';\n    const count = (state.includes('heavy') || state.includes('pouring') || state.includes('thunderstorm')) ? 60 : 30;\n    for (let i = 0; i < count; i++) {\n      content += `<i style=\"left: ${Math.random()*100}%; animation-duration: ${Math.random()*0.5+0.5}s; animation-delay: -${Math.random()*2}s;\"></i>`;\n    }\n    content += '</div>';\n  }\n\n  if (state.includes('lightning') || state.includes('thunderstorm')) {\n    content += '<div class=\"lightning-bolt\"></div>';\n  }\n\n  if (state.includes('fog') || state.includes('mist') || state.includes('smoke') || state.includes('haze') || state.includes('dust')) {\n    content += `<div style=\"position: fixed; width: 100vw; height: 100dvh; background: rgba(200,200,220,0.2); backdrop-filter: blur(1px); z-index: 6;\"></div>`;\n  }\n\n  if (['cloudy', 'overcast', 'partlycloudy'].some(term => state.includes(term))\n      && states['sun.sun'].state !== 'above_horizon') {\n\n    content += `<img src=\"/local/sky/clouds-real.png?v=3\"\n      style=\"\n        position: fixed;\n        top: 0;\n        left: 0;\n\n        width: 130vw;\n        height: 80vh;\n        object-fit: cover;\n\n        opacity: 0.35;\n\n        filter: brightness(0.6) contrast(0.85) saturate(0.6) hue-rotate(-5deg);\n\n        animation: cloudFlow 90s infinite linear;\n        z-index: 4;\n      \">`;\n  }\n\n  return content;\n]]]\n"
      background_base: "[[[\n  return `<img src=\"/local/backgrounds/background_main_flipped.jpg\" style=\"width: 100%; height: 100%; object-fit: cover;\">`;\n]]]\n"
      tree_layer: "[[[\n  const now = new Date();\n  const month = now.getMonth() + 1;\n  const day = now.getDate();\n\n  let image = \"/local/bottom_overlays/New/trees/trees.png\";\n\n  if ((month === 9 && day >= 1) || (month === 10)) {\n    image = \"/local/bottom_overlays/New/trees/trees-autumn.png\";\n  }\n\n  else if (month === 11) {\n    image = \"/local/bottom_overlays/New/trees/trees-snow1.png\";\n  }\n\n  else if (month === 12) {\n    image = \"/local/bottom_overlays/New/trees/trees-christmas.png\";\n  }\n\n  else if (\n    (month === 1) ||\n    (month === 2) ||\n    (month === 3 && day <= 1)\n  ) {\n    image = \"/local/bottom_overlays/New/trees/trees-snow2.png\";\n  }\n\n\n  let filter = \"brightness(1.1) sepia(0.2) hue-rotate(0deg) saturate(2)\";\n  if (states['sun.sun'].state != 'above_horizon') {\n    filter = \"brightness(1) sepia(0.2) hue-rotate(0deg) saturate(1.5) contrast(0.95)\";\n  }\n\n  return `<img src=\"${image}\" style=\"width: 100%; height: 100%; object-fit: cover; filter: ${filter}; transition: filter 5s ease-in-out;\">`;\n]]]\n"
      sky_atmosphere: "[[[\n  return `<div></div>`;\n]]]\n"
      sky_layer: "[[[\n  const sun = states['sun.sun'];\n  const ele = sun.attributes.elevation;\n  const isDay = sun.state == 'above_horizon';\n  const weather = states['weather.forecast_home'].state.toLowerCase();\n\n  if (isDay && (weather.includes('sunny') || weather.includes('clear'))) {\n    return `<div></div>`;\n  }\n\n  if (isDay) {\n    let brightPct = 0.5 + (Math.min(ele / 35, 1) * 0.3);\n    let sepia = (1 - Math.min(ele / 15, 1)) * 0.3;\n\n    return `<img src=\"/local/sky/clouds-real.png?v=3\"\n      style=\"width: 150vw;\n             object-fit: contain;\n             opacity: 0.7;\n             filter: brightness(${brightPct}) saturate(0.75) sepia(${sepia});\n             animation: cloudFlow 90s infinite linear;\n             transition: filter 5s ease-in-out;\">`;\n  } else {\n    let starBright = 0.5 + (Math.min(Math.abs(ele) / 35, 1) * 0.5);\n\n    return `<img src=\"/local/sky/stars_v2.png?v=2\"\n      style=\"width: 100vw;\n             opacity: 0.9;\n             filter: brightness(${starBright}) sepia(1) saturate(5) hue-rotate(10deg);\n             animation: starTwinkle 15s infinite ease-in-out;\n             transition: filter 15s ease-in-out;\">`;\n  }\n]]]\n"
      celestial_body: "[[[\n  const isDay = states['sun.sun'].attributes.elevation > -1.0;\n\n  if (isDay) {\n    return `\n      <div style=\"\n        position: relative;\n        width: 220px;\n        height: 220px;\n      \">\n        <div style=\"\n          position: absolute;\n          top: 50%;\n          left: 50%;\n          width: 70px;\n          height: 70px;\n          filter: blur(0px);\n          transform: translate(-50%, -50%);\n          border-radius: 50%;\n\n          background: radial-gradient(circle,\n            rgba(255, 248, 214, 1) 0%,\n            rgba(255, 224, 138, 0.95) 35%,\n            rgba(255, 201, 77, 0.75) 60%,\n            rgba(255, 179, 0, 0.55) 75%,\n            rgba(255, 160, 0, 0.35) 85%,\n            rgba(20, 40, 70, 0.8) 95%,\n            rgba(20, 40, 70, 0) 100%\n          );\n\n\n          box-shadow:\n            0 0 20px 10px rgba(255, 200, 80, 0.35),\n            0 0 45px 25px rgba(255, 180, 60, 0.22),\n            0 0 80px 45px rgba(255, 150, 40, 0.12);\n        \"></div>\n      </div>\n    `;\n  }\n\n    return `\n      <div style=\"\n        position: relative;\n        width: 220px;\n        height: 220px;\n        overflow: visible;\n        background: radial-gradient(circle,\n          rgba(255, 230, 150, 0.20) 0%,\n          rgba(255, 220, 140, 0.14) 20%,\n          rgba(255, 200, 120, 0.09) 25%,\n          rgba(255, 180, 100, 0.02) 38%,\n          transparent 40%\n        );\n        -webkit-mask-image: radial-gradient(circle at 75% 35%, transparent 40%, black 41%);\n        mask-image: radial-gradient(circle at 76% 40%, transparent 20%, black 32%);\n      \">\n        <div style=\"\n          position: absolute;\n          top: 50%;\n          left: 50%;\n          width: 70px;\n          height: 70px;\n          overflow: visible;\n          filter: blur(5px);\n          transform: translate(-50%, -50%);\n          border-radius: 50%;\n\n          background:\n            radial-gradient(circle,\n              rgba(255, 240, 170, 0.95) 0%,\n              rgba(250, 225, 150, 0.8) 35%,\n              rgba(235, 210, 130, 0.6) 65%,\n              rgba(210, 190, 110, 0.4) 85%,\n              rgba(12, 18, 35, 0.15) 95%,\n              rgba(12, 18, 35, 0) 100%\n            );\n\n\n          -webkit-mask-image: radial-gradient(circle at 85% 45%, transparent 45%, black 46%);\n          mask-image: radial-gradient(circle at 85% 35%, transparent 45%, black 46%);\n        \"></div>\n      </div>\n    `;\n]]]\n"
    styles:
      card:
      - background: none
      - border: none
      - overflow: hidden
      - width: 100%
      - height: 100%
      - padding: 0
      custom_fields:
        lamp_layer:
        - position: fixed
        - bottom: -40px
        - overflow: visible
        - left: 20%
        - width: 120px
        - height: 30vh
        - z-index: 0
        - pointer-events: none
        wall_bottom:
        - position: fixed
        - bottom: -80px
        - width: 100%
        - height: 25%
        - z-index: 1
        - background-image: "[[[\n  const now = new Date();\n  const month = now.getMonth() + 1;\n  const day = now.getDate();\n\
            \n  let image = \"/local/bottom_overlays/New/fence/fence-wide.png\";\n\n\n  if (month === 10 && day >= 15) {\n\
            \    image = \"/local/bottom_overlays/New/fence/fence-halloween-wide.png\";\n  }\n\n  else if (month === 11) {\n\
            \    image = \"/local/bottom_overlays/New/fence/fence-snow-wide.png\";\n  }\n\n  else if (month === 12) {\n  \
            \  image = \"/local/bottom_overlays/New/fence/fence-christmas-wide.png\";\n  }\n\n  else if (\n    (month ===\
            \ 1) ||\n    (month === 2) ||\n    (month === 3 && day <= 1)\n  ) {\n    image = \"/local/bottom_overlays/New/fence/fence-snow-wide.png\"\
            ;\n  }\n\n  return `url(${image})`;\n]]]\n"
        - background-size: cover
        - pointer-events: none
        - filter: brightness(0.9) saturate(0.95) contrast(0.85) sepia(0.25) opacity(0.9) blur(0px)
        weather_overlay:
        - position: fixed
        - top: 0
        - left: 0
        - width: 100vw
        - height: 100dvh
        - z-index: 6
        - pointer-events: none
        blur_overlay:
        - position: absolute
        - top: 0
        - left: 0
        - width: 100%
        - height: 100%
        - z-index: 2
        - pointer-events: none
        - backdrop-filter: brightness(0.7) contrast(0.85) saturate(0.9)
        - background: rgba(50, 100, 120, 0.08)
        background_base:
        - position: fixed
        - top: 0
        - left: 0
        - width: 100vw
        - height: 100dvh
        - z-index: 0
        - pointer-events: none
        - display: '[[[ return window.location.pathname.includes(''config'') ? ''none'' : ''block'' ]]]

            '
        tree_layer:
        - position: fixed
        - bottom: 0px
        - left: 0
        - overflow: visible
        - width: 100vw
        - height: 28vh
        - z-index: "[[[\n  const state = states['weather.forecast_home'].state.toLowerCase();\n  const isFoggy = ['fog', 'mist',\
            \ 'smoke', 'haze', 'dust', 'cloudy', 'partlycloudy'].some(term => state.includes(term));\n\n  return isFoggy ?\
            \ -1 : -4;\n]]]\n"
        - pointer-events: none
        - background: none
        - filter: brightness(0.75) saturate(0.65) contrast(0.9)
        sky_atmosphere:
        - position: fixed
        - top: 0
        - left: 0
        - width: 100vw
        - height: 100dvh
        - z-index: 1
        - transition: background 5s ease-in-out
        - background: "[[[\n  const sun = states['sun.sun'];\n  const ele = sun.attributes.elevation;\n  const isDay = sun.state\
            \ === 'above_horizon';\n\n  const lerp = (a, b, t) => a + (b - a) * t;\n  const blend = (c1, c2, t) =>\n    `rgba(${lerp(c1[0],\
            \ c2[0], t)}, ${lerp(c1[1], c2[1], t)}, ${lerp(c1[2], c2[2], t)}, ${lerp(c1[3], c2[3], t)})`;\n\n  if (isDay)\
            \ {\n    let progress = Math.min(Math.max(ele / 45, 0), 1);\n    const pct = Math.pow(progress, 0.6);\n\n    let\
            \ top = blend(\n      [10, 20, 125, 0.65],\n      [5, 10, 80, 0.6],\n      pct\n    );\n\n    let mid = blend(\n\
            \      [60, 120, 150, 0.55],\n      [110, 165, 190, 0.5],\n      pct\n    );\n\n    let bot;\n    if (ele < 18)\
            \ {\n      let warmPct = Math.max(0, (10 - ele) / 10);\n      let glowIntensity = Math.pow(warmPct, 0.8);\n\n\
            \      bot = blend(\n        [202, 110, 70, 0.85],\n        [200, 65, 10, 0.55],\n        glowIntensity\n    \
            \  );\n    } else {\n      bot = blend(\n        [75, 140, 145, 0.6],\n        [80, 110, 150, 0.8],\n        pct\n\
            \      );\n    }\n\n    return `linear-gradient(180deg, ${top} 0%, ${mid} 50%, ${bot} 95%)`;\n  }\n\n  const absEle\
            \ = Math.abs(ele);\n\n  if (ele < -20) {\n    return `\n      linear-gradient(\n        180deg,\n        rgba(8,\
            \ 12, 25, 0.85) 0%,\n        rgba(12, 18, 35, 0.75) 100%\n      )\n    `;\n  }\n\n  let pct = Math.min(absEle\
            \ / 20, 1);\n  let top = blend([8, 12, 25, 0.85], [20, 30, 50, 0.7], pct);\n  let bot = blend([12, 18, 35, 0.75],\
            \ [40, 60, 80, 0.6], pct);\n\n  return `linear-gradient(180deg, ${top} 0%, ${bot} 100%)`;\n]]]\n"
        sky_layer:
        - position: contain
        - top: 10%
        - height: 100dvh
        - left: 0
        - width: 100vw
        - filter: brightness(0.85) saturate(0.65) blur(0.5px) opacity(0.3)
        - z-index: 3
        celestial_body:
        - position: fixed
        - overflow: visible
        - transition: all 2s ease-in-out
        - z-index: 4
        - width: '[[[ return states[''sun.sun''].state == ''above_horizon'' ? ''110px'' : ''100px''; ]]]

            '
        - height: '[[[ return states[''sun.sun''].state == ''above_horizon'' ? ''90px'' : ''80px''; ]]]

            '
        - filter: "[[[\n  const isDay = states['sun.sun'].state == 'above_horizon';\n  const brightness = isDay ? \"brightness(0.8)\
            \ sepia(0.1) saturate(0.9) contrast(0.8) opacity(0.8)\" : \"brightness(0.8) saturate(0.7) opacity(0.85)\";\n \
            \ const shadow = isDay\n    ? \"drop-shadow(0px 0px 15px rgba(255, 200, 50, 0.8))\"\n    : \"drop-shadow(0px 0px\
            \ 5px rgba(255, 255, 255, 0.2))\";\n\n  return `${brightness} ${shadow}`;\n]]]\n"
        - bottom: "[[[\n  const ele = states['sun.sun'].attributes.elevation;\n  const isDay = states['sun.sun'].state ===\
            \ 'above_horizon';\n  const dayPeak = 60;\n\n  let pct = isDay\n    ? Math.max(0, Math.min(ele / dayPeak, 1))\n\
            \    : Math.max(0, Math.min(Math.abs(ele) / 35, 1));\n\n  return (19 + (pct * 30)) + '%';\n]]]\n"
        - left: "[[[\n  const now = Date.now();\n\n  const nextSunrise = new Date(states['sun.sun'].attributes.next_rising).getTime();\n\
            \  const nextSunset  = new Date(states['sun.sun'].attributes.next_setting).getTime();\n\n  let progress;\n\n \
            \ if (states['sun.sun'].state === 'above_horizon') {\n    const todaySunrise = nextSunrise - 24 * 60 * 60 * 1000;\n\
            \    progress = (now - todaySunrise) / (nextSunset - todaySunrise);\n  } else {\n    const todaySunset = nextSunset\
            \ - 24 * 60 * 60 * 1000;\n    progress = (now - todaySunset) / (nextSunrise - todaySunset);\n  }\n\n  progress\
            \ = Math.min(Math.max(progress, 0), 1);\n\n  const percent = 15 + (progress * 75);\n\n  return `calc(${percent}%\
            \ - 110px)`;\n]]]"
