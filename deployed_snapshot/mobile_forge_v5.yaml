  cozy_camera_tile:
    variables:
      camera_entity: camera.unknown
      motion_entity: ''
      last_motion_entity: ''
      battery_entity: ''
      cute_name: ''
      emoji: 📷
    show_name: false
    show_icon: false
    tap_action:
      action: more-info
      entity: '[[[ return variables.camera_entity; ]]]'
    custom_fields:
      body: "[[[\n  const cam = states[variables.camera_entity];\n  if (!cam) {\n    return `<div style=\"color:#888;font-size:12px;padding:14px;\"\
        >\n      ${variables.camera_entity} not found\n    </div>`;\n  }\n\n  const friendly = (variables.cute_name || cam.attributes.friendly_name\
        \ || 'Camera').trim();\n  const emoji = variables.emoji || '\U0001F4F7';\n\n  // ── Motion detection ──\n  const motionState\
        \ = variables.motion_entity ? states[variables.motion_entity] : null;\n  const motionActive = motionState && motionState.state\
        \ === 'on';\n\n  // ── Last motion timestamp ──\n  let lastMotionStr = '';\n  let recentMotion = false;\n  const lmEntity\
        \ = variables.last_motion_entity ? states[variables.last_motion_entity] : null;\n  const motionRefEntity = lmEntity\
        \ || motionState;\n  if (motionRefEntity) {\n    const ts = lmEntity\n      ? new Date(lmEntity.state).getTime()\n\
        \      : new Date(motionState.last_changed).getTime();\n    if (!isNaN(ts) && ts > 0) {\n      const diff = Date.now()\
        \ - ts;\n      recentMotion = diff < 60 * 1000;     // last 60s = pulsing border\n      const mins = Math.round(diff\
        \ / 60000);\n      const hrs  = Math.round(mins / 60);\n      if (motionActive)        lastMotionStr = 'Movement now!';\n\
        \      else if (diff < 60000)    lastMotionStr = 'Just now';\n      else if (mins < 60)       lastMotionStr = `Seen\
        \ ${mins}m ago`;\n      else if (hrs < 24)        lastMotionStr = `Seen ${hrs}h ago`;\n      else                \
        \      lastMotionStr = 'All quiet';\n    } else {\n      lastMotionStr = motionActive ? 'Movement now!' : 'All quiet';\n\
        \    }\n  } else {\n    lastMotionStr = 'All quiet';\n  }\n\n  // ── Battery indicator (Blink) ──\n  let batteryHtml\
        \ = '';\n  if (variables.battery_entity && states[variables.battery_entity]) {\n    const bat = states[variables.battery_entity].state;\n\
        \    const batNum = parseInt(bat, 10);\n    // Some integrations report \"ok\"/\"low\" instead of %; both handled\n\
        \    if (!isNaN(batNum)) {\n      const color = batNum < 20 ? '#ff8a6a' : batNum < 50 ? '#ffd6a8' : 'rgba(255,235,215,0.7)';\n\
        \      batteryHtml = `<span style=\"font-size:11px; color:${color};\">\U0001F50B ${batNum}%</span>`;\n    } else if\
        \ (bat === 'low') {\n      batteryHtml = `<span style=\"font-size:11px; color:#ff8a6a;\">\U0001FAAB low</span>`;\n\
        \    } else if (bat === 'ok') {\n      batteryHtml = `<span style=\"font-size:11px; color:rgba(255,235,215,0.65);\"\
        >\U0001F50B ok</span>`;\n    }\n  }\n\n  // ── Snapshot URL — re-renders on entity changes (motion fires) ──\n  const\
        \ ts = Math.floor(Date.now() / 30000);\n  const snapshot = `/api/camera_proxy/${variables.camera_entity}?_=${ts}`;\n\
        \n  // ── Border / glow style for motion alert ──\n  const alertStyle = (motionActive || recentMotion)\n    ? `border:\
        \ 1.5px solid rgba(255, 140, 120, 0.65);\n       box-shadow: 0 0 24px rgba(255, 130, 100, 0.45),\n               \
        \    inset 0 0 18px rgba(255, 100, 80, 0.12);\n       animation: gentleBreathe 1.6s ease-in-out infinite;`\n    :\
        \ `border: 1px solid rgba(255, 230, 210, 0.10);\n       box-shadow: 0 4px 16px rgba(0,0,0,0.35);`;\n\n  const statusColor\
        \ = motionActive\n    ? 'rgba(255, 200, 180, 0.95)'\n    : recentMotion\n      ? 'rgba(255, 215, 195, 0.85)'\n   \
        \   : 'rgba(255, 230, 210, 0.7)';\n\n  return `\n    <div style=\"\n      position: relative;\n      width: 100%;\
        \ height: 100%;\n      border-radius: 16px;\n      overflow: hidden;\n      background: rgba(20, 17, 22, 0.55);\n\
        \      backdrop-filter: blur(12px) saturate(140%);\n      ${alertStyle}\n      transition: all 0.5s ease-out;\n  \
        \  \">\n      <!-- snapshot fills tile -->\n      <img src=\"${snapshot}\"\n        onerror=\"this.style.opacity=0.0;\"\
        \n        style=\"\n          position: absolute; inset: 0;\n          width: 100%; height: 100%;\n          object-fit:\
        \ cover;\n          filter: ${motionActive ? 'brightness(1.05) contrast(1.05)' : 'brightness(0.92) saturate(0.95)'};\n\
        \          transition: filter 0.4s;\n        \">\n\n      <!-- bottom gradient for legibility -->\n      <div style=\"\
        \n        position: absolute; left: 0; right: 0; bottom: 0; height: 60%;\n        background: linear-gradient(180deg,\
        \ transparent 0%, rgba(15,12,18,0.5) 50%, rgba(15,12,18,0.92) 100%);\n        pointer-events: none;\n      \"></div>\n\
        \n      <!-- top row: emoji + name + battery -->\n      <div style=\"\n        position: absolute; top: 10px; left:\
        \ 12px; right: 12px;\n        display: flex; align-items: center; justify-content: space-between;\n        font-family:\
        \ 'Inter', sans-serif;\n      \">\n        <div style=\"display:flex; align-items:center; gap:6px;\">\n          <span\
        \ style=\"font-size:18px;\">${emoji}</span>\n          <span style=\"\n            font-size: 13px;\n            font-weight:\
        \ 400;\n            color: rgba(255, 245, 230, 0.95);\n            text-shadow: 0 1px 3px rgba(0,0,0,0.7);\n     \
        \       letter-spacing: 0.02em;\n          \">${friendly}</span>\n        </div>\n        ${batteryHtml}\n      </div>\n\
        \n      <!-- bottom: status line -->\n      <div style=\"\n        position: absolute; bottom: 10px; left: 14px; right:\
        \ 14px;\n        font-family: 'Caveat', 'Georgia', cursive;\n        font-style: italic;\n        font-size: 16px;\n\
        \        color: ${statusColor};\n        text-shadow: 0 1px 4px rgba(0,0,0,0.8);\n      \">${lastMotionStr}</div>\n\
        \n      <!-- live indicator dot -->\n      ${motionActive ? `\n        <div style=\"\n          position: absolute;\
        \ top: 12px; right: 12px;\n          width: 8px; height: 8px; border-radius: 50%;\n          background: #ff7a5a;\n\
        \          box-shadow: 0 0 8px rgba(255, 120, 90, 0.9);\n          animation: chargingPulse 1s ease-in-out infinite;\n\
        \        \"></div>` : ''}\n    </div>`;\n]]]\n"
    styles:
