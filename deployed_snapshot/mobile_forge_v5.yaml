        \         rgba(15,12,18,0.35) 0%,\n          rgba(15,12,18,0.55) 45%,\n          rgba(15,12,18,0.92) 100%);\n    \
        \    ${hasArt ? 'backdrop-filter: blur(2px) saturate(120%);' : ''}\n        pointer-events: none;\n      \"></div>\n\
        \n      <!-- content stack -->\n      <div style=\"position: relative; padding: 14px; height: 100%; display: flex;\
        \ flex-direction: column;\">\n        <!-- top: emoji + room name -->\n        <div style=\"display: flex; align-items:\
        \ center; gap: 8px;\">\n          <span style=\"font-size: 20px; filter: drop-shadow(0 1px 3px rgba(0,0,0,0.6));\"\
        >${emoji}</span>\n          <span style=\"\n            font-family: 'Inter', sans-serif;\n            font-size:\
        \ 13px;\n            font-weight: 400;\n            color: rgba(255, 245, 230, 0.95);\n            letter-spacing:\
        \ 0.02em;\n            text-shadow: 0 1px 3px rgba(0,0,0,0.7);\n          \">${friendly}</span>\n        </div>\n\n\
        \        <!-- middle/bottom: now playing or quiet -->\n        <div style=\"margin-top: auto;\">\n          ${showSong\
        \ ? `\n            <div style=\"\n              font-family: 'Inter', sans-serif;\n              font-size: 15px;\n\
        \              font-weight: 500;\n              color: rgba(255, 245, 230, 0.96);\n              white-space: nowrap;\
        \ overflow: hidden; text-overflow: ellipsis;\n              text-shadow: 0 1px 3px rgba(0,0,0,0.8);\n            \"\
        >${title}</div>\n            <div style=\"\n              font-family: 'Caveat', 'Georgia', cursive;\n           \
        \   font-style: italic;\n              font-size: 15px;\n              color: rgba(255, 225, 205, 0.85);\n       \
        \       margin-top: 1px;\n              white-space: nowrap; overflow: hidden; text-overflow: ellipsis;\n        \
        \      text-shadow: 0 1px 3px rgba(0,0,0,0.7);\n            \">${artist}${album ? ' · ' + album : ''}</div>\n    \
        \      ` : `\n            <div style=\"\n              font-family: 'Caveat', 'Georgia', cursive;\n              font-style:\
        \ italic;\n              font-size: 18px;\n              color: rgba(255, 225, 205, 0.7);\n              text-shadow:\
        \ 0 1px 3px rgba(0,0,0,0.6);\n            \">Quiet for now</div>\n            ${source ? `<div style=\"font-family:'Inter',sans-serif;\
        \ font-size:11px; color:rgba(255,235,215,0.5); margin-top:2px;\">via ${source}</div>` : ''}\n          `}\n\n    \
        \      <!-- bottom mini status row -->\n          <div style=\"\n            margin-top: 8px;\n            display:\
        \ flex; align-items: center; gap: 8px;\n            font-family: 'Inter', sans-serif;\n            font-size: 11px;\n\
        \            color: rgba(255, 235, 215, 0.65);\n          \">\n            <span>${transport}</span>\n           \
        \ <span>·</span>\n            <span>${muted ? '\U0001F507 muted' : '\U0001F509 ' + volume}</span>\n          </div>\n\
        \        </div>\n      </div>\n\n      <!-- live dot when playing -->\n      ${isPlaying ? `\n        <div style=\"\
        \n          position: absolute; top: 14px; right: 14px;\n          width: 9px; height: 9px; border-radius: 50%;\n\
        \          background: #a8d8b9;\n          box-shadow: 0 0 10px #a8d8b9;\n          animation: chargingPulse 1.4s\
        \ ease-in-out infinite;\n        \"></div>` : ''}\n    </div>`;\n]]]\n"
