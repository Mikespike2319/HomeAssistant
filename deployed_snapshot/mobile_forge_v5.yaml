        \  { label: 'Vacation mode',     sub: 'Holding down the fort',emoji: '✈️', color: '#e8d8a8', glow: 'rgba(232, 216,\
        \ 168, 0.32)' },\n    arming:          { label: 'Settling in…',      sub: 'Just a moment',        emoji: '⏳', color:\
        \ '#e8d8a8', glow: 'rgba(232, 216, 168, 0.30)' },\n    disarming:       { label: 'Stand down…',       sub: 'Just a\
        \ moment',        emoji: '⏳', color: '#a8d8b9', glow: 'rgba(168, 216, 185, 0.30)' },\n    triggered:       { label:\
        \ 'ALARM!',            sub: 'Something tripped',    emoji: '\U0001F6A8', color: '#ff8a6a', glow: 'rgba(255, 138, 106,\
        \ 0.55)' },\n    pending:         { label: 'Heads up…',         sub: 'Triggered, countdown', emoji: '⚠️', color: '#ffb37a',\
        \ glow: 'rgba(255, 179, 122, 0.40)' },\n  };\n  const s = stateMap[state] || { label: state, sub: '', emoji: '\U0001F510\
        ', color: '#aaa', glow: 'rgba(255,255,255,0.15)' };\n  const isArmed = state.startsWith('armed') || state === 'arming';\n\
        \  const isTriggered = state === 'triggered' || state === 'pending';\n\n  return `\n    <div style=\"\n      position:\
        \ relative;\n      width: 100%; height: 100%;\n      padding: 22px 24px;\n      border-radius: 22px;\n      background:\
        \ linear-gradient(160deg, ${s.glow} 0%, rgba(25,20,28,0.65) 60%, rgba(15,12,20,0.78) 100%);\n      border: 1px solid\
        \ ${s.color}55;\n      backdrop-filter: blur(16px) saturate(150%);\n      box-shadow: 0 8px 32px rgba(0,0,0,0.4),\n\
        \                  inset 0 1px 0 rgba(255,255,255,0.06),\n                  0 0 ${isTriggered ? '60px' : '0px'} ${s.glow};\n\
        \      transition: all 0.6s ease-out;\n      ${isTriggered ? 'animation: chargingPulse 1.2s ease-in-out infinite;'\
        \ : ''}\n    \">\n      <div style=\"display:flex; align-items:center; gap:14px;\">\n        <div style=\"font-size:\
        \ 38px; line-height: 1; filter: drop-shadow(0 2px 6px rgba(0,0,0,0.4));\">\n          ${s.emoji}\n        </div>\n\
        \        <div>\n          <div style=\"\n            font-family: 'Caveat', 'Georgia', cursive;\n            font-style:\
        \ italic;\n            font-size: 26px;\n            font-weight: 500;\n            color: ${s.color};\n         \
        \   text-shadow: 0 1px 4px rgba(0,0,0,0.6);\n            line-height: 1.1;\n          \">${s.label}</div>\n      \
        \    <div style=\"\n            font-family: 'Inter', sans-serif;\n            font-size: 12px;\n            font-weight:\
        \ 300;\n            color: rgba(255, 235, 215, 0.7);\n            margin-top: 3px;\n            letter-spacing: 0.02em;\n\
        \          \">${s.sub}</div>\n        </div>\n      </div>\n\n      <!-- gentle status dot -->\n      <div style=\"\
