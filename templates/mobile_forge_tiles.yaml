button_card_templates:
  mf_page_title:
    show_icon: false
    show_name: true
    show_label: true
    name: '[[[ return variables.title || ""; ]]]'
    label: '[[[ return variables.subtitle || ""; ]]]'
    styles:
      card:
        - padding: 22px 4px 10px
        - background: transparent
        - box-shadow: none
        - border: none
        - position: relative
        - z-index: 2
      name:
        - justify-self: start
        - color: rgba(255,248,231,0.96)
        - font-size: 34px
        - line-height: 38px
        - font-weight: 850
        - letter-spacing: 0
      label:
        - justify-self: start
        - color: rgba(235,220,190,0.66)
        - font-size: 14px
        - line-height: 19px
        - font-weight: 650
        - padding-top: 6px

  mf_hero:
    show_icon: true
    show_name: false
    show_label: true
    icon: '[[[ return variables.icon || "mdi:home"; ]]]'
    label: '[[[ return variables.subtitle || ""; ]]]'
    custom_fields:
      value: '[[[ return variables.value || (entity ? entity.state : ""); ]]]'
    styles:
      card:
        - min-height: 158px
        - padding: 18px
        - border-radius: 20px
        - border: 1px solid rgba(238,222,190,0.26)
        - background: radial-gradient(circle at 12% 18%, rgba(241,194,122,0.16), transparent 9rem), radial-gradient(circle at 88% 70%, rgba(156,201,162,0.12), transparent 12rem), linear-gradient(150deg, rgba(48,41,32,0.80), rgba(20,28,24,0.76))
        - box-shadow: 0 22px 56px rgba(2,7,7,0.42), inset 0 1px 0 rgba(255,248,231,0.06)
        - backdrop-filter: blur(20px) saturate(1.16)
        - position: relative
        - z-index: 2
      grid:
        - grid-template-areas: '"i value" "i l"'
        - grid-template-columns: 92px 1fr
        - grid-template-rows: min-content min-content
        - column-gap: 18px
        - align-items: center
      icon:
        - width: 42px
        - color: '[[[ return variables.accent_color || "rgba(241,194,122,0.96)"; ]]]'
      img_cell:
        - grid-area: i
        - width: 74px
        - height: 74px
        - border-radius: 24px
        - background: radial-gradient(circle at 34% 24%, rgba(255,248,231,0.18), transparent 50%), rgba(241,194,122,0.10)
        - box-shadow: inset 0 0 0 1px rgba(241,194,122,0.18), 0 18px 38px rgba(0,0,0,0.24)
      label:
        - grid-area: l
        - justify-self: start
        - color: rgba(235,220,190,0.66)
        - font-size: 13px
        - line-height: 18px
        - font-weight: 650
      custom_fields:
        value:
          - grid-area: value
          - justify-self: start
          - color: rgba(255,248,231,0.96)
          - font-size: 48px
          - line-height: 50px
          - font-weight: 350

  mf_tile:
    show_icon: true
    show_name: true
    show_label: true
    show_state: false
    icon: '[[[ return variables.icon || "mdi:circle"; ]]]'
    name: '[[[ return variables.title || entity?.attributes?.friendly_name || ""; ]]]'
    label: '[[[ return variables.subtitle || ""; ]]]'
    custom_fields:
      value: '[[[ return variables.value || (entity ? entity.state : ""); ]]]'
    styles:
      card:
        - min-height: 106px
        - padding: 14px
        - border-radius: 20px
        - border: 1px solid rgba(238,222,190,0.16)
        - background: linear-gradient(145deg, rgba(255,248,231,0.055), transparent 38%), linear-gradient(150deg, rgba(38,35,30,0.78), rgba(24,28,25,0.74))
        - box-shadow: 0 22px 56px rgba(2,7,7,0.42), inset 0 1px 0 rgba(255,248,231,0.06)
        - backdrop-filter: blur(20px) saturate(1.16)
        - position: relative
        - z-index: 2
      grid:
        - grid-template-areas: '"i n" "value value" "l l"'
        - grid-template-columns: 22px 1fr
        - grid-template-rows: min-content 1fr min-content
        - column-gap: 8px
        - row-gap: 5px
        - align-items: start
      icon:
        - width: 18px
        - color: '[[[ return variables.accent_color || "rgba(136,199,216,0.95)"; ]]]'
      img_cell:
        - justify-self: start
        - align-self: center
      name:
        - justify-self: start
        - align-self: center
        - color: rgba(255,248,231,0.94)
        - font-size: 14px
        - line-height: 18px
        - font-weight: 800
        - white-space: normal
        - text-align: left
      label:
        - justify-self: start
        - color: rgba(235,220,190,0.66)
        - font-size: 13px
        - line-height: 17px
        - font-weight: 650
      custom_fields:
        value:
          - grid-area: value
          - justify-self: start
          - align-self: end
          - color: rgba(255,248,231,0.96)
          - font-size: 30px
          - line-height: 32px
          - font-weight: 360

  # Light-only variant of mf_tile: tap = instant toggle,
  # hold / double-tap = native more-info dialog (full Hue
  # brightness + color + scene control). Do NOT use the bare
  # mf_tile toggle behaviour on sensors/cameras/locks.
  mf_light_tile:
    template: mf_tile
    tap_action:
      action: toggle
    hold_action:
      action: more-info
    double_tap_action:
      action: more-info

  # Govee variant: tap still toggles, but the native more-info dialog is
  # disabled because Govee's color_temp_kelvin range is inverted (integration
  # bug) — dragging the slider throws "API-Error 400 colorTem". Adjust Govee
  # brightness/color via scenes (hs_color) or the Govee app instead.
  mf_govee_tile:
    template: mf_light_tile
    hold_action:
      action: none
    double_tap_action:
      action: none

  mf_pill:
    show_icon: true
    show_name: true
    icon: '[[[ return variables.icon || "mdi:circle"; ]]]'
    name: '[[[ return variables.label || ""; ]]]'
    styles:
      card:
        - min-height: 40px
        - padding: 0 14px
        - border-radius: 15px
        - border: 1px solid rgba(238,222,190,0.16)
        - background: rgba(18,22,19,0.72)
        - box-shadow: inset 0 1px 0 rgba(255,248,231,0.045)
        - position: relative
        - z-index: 2
      grid:
        - grid-template-areas: '"i n"'
        - grid-template-columns: 18px 1fr
        - column-gap: 8px
        - align-items: center
      icon:
        - width: 16px
        - color: '[[[ return variables.accent_color || "rgba(241,194,122,0.96)"; ]]]'
      name:
        - justify-self: start
        - color: rgba(255,248,231,0.88)
        - font-size: 13px
        - line-height: 15px
        - font-weight: 800

  mf_section_label:
    show_icon: true
    show_name: true
    icon: '[[[ return variables.icon || "mdi:label-outline"; ]]]'
    name: '[[[ return variables.label || ""; ]]]'
    styles:
      card:
        - min-height: 44px
        - padding: 0 14px
        - border-radius: 14px
        - border: 1px solid rgba(238,222,190,0.12)
        - background: rgba(9,13,12,0.62)
        - box-shadow: none
        - position: relative
        - z-index: 2
      grid:
        - grid-template-areas: '"i n"'
        - grid-template-columns: 22px 1fr
        - column-gap: 8px
        - align-items: center
      icon:
        - width: 18px
        - color: '[[[ return variables.accent_color || "rgba(136,199,216,0.95)"; ]]]'
      name:
        - justify-self: start
        - color: rgba(255,248,231,0.88)
        - font-size: 16px
        - line-height: 18px
        - font-weight: 850

  mf_model_y_juniper:
    show_icon: false
    show_name: false
    show_label: false
    custom_fields:
      image: |
        [[[
          const src = variables.image || "/local/mobile-forge/model-y-juniper-transparent.png";
          return `
            <img src="${src}" alt="Tesla Model Y Juniper" style="
              width:100%;
              height:244px;
              display:block;
              object-fit:contain;
              object-position:center;
              filter:saturate(0.94) contrast(1.02);
            ">
            <div style="
              position:absolute;
              left:12px;
              bottom:12px;
              min-height:36px;
              padding:0 12px;
              display:inline-flex;
              align-items:center;
              gap:8px;
              border-radius:15px;
              border:1px solid rgba(255,255,255,0.16);
              background:rgba(13,15,19,0.78);
              color:rgba(255,248,231,0.94);
              font-weight:900;
              font-size:13px;
              line-height:1;
              backdrop-filter:blur(12px);
              box-shadow:0 12px 28px rgba(0,0,0,0.28);
              pointer-events:none;
            ">
              <ha-icon icon="mdi:car-electric" style="width:17px;height:17px;color:rgba(136,199,216,0.95);"></ha-icon>
              <span>Model Y Juniper</span>
            </div>
          `;
        ]]]
    styles:
      card:
        - height: 244px
        - padding: 0
        - border-radius: 18px
        - border: 1px solid rgba(238,222,190,0.16)
        - background: linear-gradient(150deg, rgba(38,35,30,0.78), rgba(24,28,25,0.74))
        - box-shadow: 0 18px 48px rgba(0,0,0,0.24)
        - backdrop-filter: blur(20px) saturate(1.16)
        - overflow: hidden
        - position: relative
        - z-index: 2
      grid:
        - grid-template-areas: '"image"'
      custom_fields:
        image:
          - grid-area: image

  mf_media_now:
    show_icon: false
    show_name: false
    show_label: false
    entity: media_player.bed_room_tv
    tap_action:
      action: more-info
    custom_fields:
      screen: |
        [[[
          const e = entity || states[variables.entity] || {};
          const attrs = e.attributes || {};
          const state = e.state || "idle";
          const source = attrs.source || attrs.app_name || "YouTube";
          const title = attrs.media_title || attrs.friendly_name || variables.title || "Bedroom TV";
          const room = variables.room || "Bedroom TV";
          const pct = Math.max(0, Math.min(100, Number(attrs.media_position || 0) / Math.max(1, Number(attrs.media_duration || 1)) * 100));
          const width = Number.isFinite(pct) && pct > 0 ? pct : 42;
          const label = state === "playing" ? "Playing in bedroom" : state === "paused" ? "Paused" : "Ready";
          return `
            <div style="min-height:196px;padding:14px;position:relative;display:grid;align-items:stretch;background:radial-gradient(circle at 72% 12%,rgba(121,199,255,.18),transparent 9rem),linear-gradient(180deg,rgba(23,28,38,.72),rgba(12,14,18,.68));">
              <div style="position:absolute;inset:20px 34px 64px;border-radius:32px;background:radial-gradient(circle,rgba(121,199,255,.22),transparent 68%);filter:blur(28px);"></div>
              <div style="position:relative;min-height:168px;padding:16px;border-radius:19px;border:1px solid rgba(255,255,255,.13);background:linear-gradient(135deg,rgba(121,199,255,.16),transparent 42%),radial-gradient(circle at 82% 18%,rgba(255,211,164,.12),transparent 28%),#10151d;box-shadow:inset 0 1px 0 rgba(255,255,255,.10),0 22px 42px rgba(0,0,0,.32);display:grid;align-content:end;gap:8px;">
                <div style="position:absolute;top:14px;left:14px;right:14px;display:flex;justify-content:space-between;color:rgba(255,246,235,.56);font-size:10px;font-weight:850;letter-spacing:.08em;text-transform:uppercase;">
                  <span>${room}</span><span>${source}</span>
                </div>
                <div style="font-size:28px;line-height:30px;font-weight:850;color:rgba(255,246,235,.96);">${title}</div>
                <div style="color:rgba(255,235,215,.62);font-size:13px;line-height:17px;font-weight:650;">${label}</div>
                <div style="height:5px;border-radius:999px;overflow:hidden;background:rgba(255,255,255,.12);">
                  <div style="height:100%;width:${width}%;border-radius:999px;background:linear-gradient(90deg,#ffd3a4,#79c7ff);"></div>
                </div>
              </div>
            </div>
          `;
        ]]]
      meta: |
        [[[
          const e = entity || states[variables.entity] || {};
          const attrs = e.attributes || {};
          const source = attrs.source || attrs.app_name || "YouTube";
          const volume = attrs.volume_level !== undefined ? Math.round(Number(attrs.volume_level) * 100) : 18;
          const state = e.state === "playing" ? "Now playing" : e.state === "paused" ? "Paused" : "Ready";
          const title = attrs.friendly_name || variables.title || "Bedroom TV";
          const detail = `${source} · ${volume} volume`;
          return `
            <div style="padding:12px 16px 14px;display:flex;align-items:center;justify-content:space-between;gap:14px;">
              <div style="min-width:0;">
                <div style="color:#79c7ff;font-size:11px;line-height:14px;font-weight:850;letter-spacing:.08em;text-transform:uppercase;">${state}</div>
                <div style="margin-top:3px;font-size:23px;line-height:27px;font-weight:850;color:rgba(255,246,235,.96);">${title}</div>
                <div style="color:rgba(255,235,215,.62);font-size:13px;line-height:18px;">${detail}</div>
              </div>
              <div style="display:flex;gap:8px;">
                <span style="width:38px;height:38px;border-radius:15px;display:grid;place-items:center;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.06);"><ha-icon icon="mdi:power" style="width:18px;height:18px;color:#f3a6b8;"></ha-icon></span>
                <span style="width:38px;height:38px;border-radius:15px;display:grid;place-items:center;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.06);"><ha-icon icon="mdi:pause" style="width:18px;height:18px;color:#ffd3a4;"></ha-icon></span>
                <span style="width:38px;height:38px;border-radius:15px;display:grid;place-items:center;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.06);"><ha-icon icon="mdi:volume-high" style="width:18px;height:18px;color:#79c7ff;"></ha-icon></span>
              </div>
            </div>
          `;
        ]]]
    styles:
      card:
        - padding: 0
        - border-radius: 18px
        - border: 1px solid rgba(238,222,190,0.16)
        - background: linear-gradient(150deg, rgba(38,35,30,0.78), rgba(24,28,25,0.74))
        - box-shadow: 0 18px 48px rgba(0,0,0,0.24)
        - backdrop-filter: blur(20px) saturate(1.16)
        - overflow: hidden
        - position: relative
        - z-index: 2
      grid:
        - grid-template-areas: '"screen" "meta"'
      custom_fields:
        screen:
          - grid-area: screen
        meta:
          - grid-area: meta

  mf_device_row:
    show_icon: true
    show_name: true
    show_label: true
    show_state: false
    icon: '[[[ return variables.icon || "mdi:television"; ]]]'
    name: '[[[ return variables.title || entity?.attributes?.friendly_name || ""; ]]]'
    label: '[[[ return variables.subtitle || ""; ]]]'
    custom_fields:
      state: |
        [[[
          if (variables.value) return variables.value;
          if (!entity || entity.state === "unavailable") return "Offline";
          if (entity.state === "playing") return "Playing";
          if (entity.state === "paused") return "Paused";
          if (entity.state === "standby") return "Standby";
          if (entity.state === "off") return "Standby";
          return entity.state.replace(/_/g, " ");
        ]]]
    styles:
      card:
        - min-height: 72px
        - padding: 12px
        - border-radius: 18px
        - border: 1px solid rgba(238,222,190,0.16)
        - background: '[[[ return entity?.state === "playing" ? "linear-gradient(150deg, rgba(70,51,39,0.72), rgba(22,20,28,0.70))" : "linear-gradient(150deg, rgba(38,35,30,0.78), rgba(24,28,25,0.74))"; ]]]'
        - box-shadow: 0 18px 48px rgba(0,0,0,0.24)
        - backdrop-filter: blur(20px) saturate(1.16)
        - position: relative
        - z-index: 2
      grid:
        - grid-template-areas: '"i n state" "i l state"'
        - grid-template-columns: 42px 1fr auto
        - grid-template-rows: min-content min-content
        - column-gap: 12px
        - align-items: center
      img_cell:
        - grid-area: i
        - width: 42px
        - height: 42px
        - border-radius: 15px
        - background: rgba(255,255,255,0.07)
      icon:
        - width: 18px
        - color: '[[[ return variables.accent_color || "rgba(136,199,216,0.95)"; ]]]'
      name:
        - grid-area: n
        - justify-self: start
        - color: rgba(255,248,231,0.94)
        - font-size: 14px
        - line-height: 18px
        - font-weight: 850
        - white-space: normal
        - text-align: left
      label:
        - grid-area: l
        - justify-self: start
        - color: rgba(235,220,190,0.66)
        - font-size: 12px
        - line-height: 16px
        - font-weight: 650
      custom_fields:
        state:
          - grid-area: state
          - color: rgba(255,248,231,0.84)
          - font-size: 12px
          - line-height: 16px
          - font-weight: 850

  mf_nav_spacer:
    show_icon: false
    show_name: false
    show_label: false
    tap_action:
      action: none
    styles:
      card:
        - height: 104px
        - min-height: 104px
        - padding: 0
        - background: transparent
        - box-shadow: none
        - border: none
        - pointer-events: none
        - position: relative
        - z-index: 1
