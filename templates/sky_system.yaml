button_card_templates:
  sky_system:
    show_name: false
    show_icon: false
    extra_styles: |
      [[[
        const isEditing = window.location.search.includes('edit=1') || window.location.pathname.includes('config');
        if (isEditing) {
          return `
            #card {
              position: relative !important;
              height: 100px !important;
              background: rgba(0,0,0,0.4) !important;
              border-radius: 12px;
            }
            * {
              display: none !important;
            }
          `;
        } else {
          return `
            #card {
              position: fixed !important;
              top: 0; left: 0;
              width: 100vw !important;
              height: 100vh !important;
              z-index: 0;
              pointer-events: none;
            }
            @keyframes cloudFlow {
              0%   { transform: translate(-20%, -2%); }
              50%  { transform: translate(0%, 0%); }
              100% { transform: translate(-20%, -2%); }
            }
            @keyframes starTwinkle { 0%, 100% { opacity: 0.3; } 50% { opacity: 0.8; } }
            @keyframes snowFall {
              0% { transform: translateY(-10vh) translateX(0px); }
              100% { transform: translateY(110vh) translateX(20px); }
            }
            @keyframes rainFall {
              0% { transform: translateY(-20vh); }
              100% { transform: translateY(110vh); }
            }
            @keyframes lightningFlash {
              0%, 90%, 100% { background: transparent; }
              92% { background: rgba(255,255,255,0.4); }
              94% { background: transparent; }
              96% { background: rgba(255,255,255,0.7); }
            }
            .snowflakes i, .rain-drops i {
              position: fixed;
              background: white;
              top: -10px;
              pointer-events: none;
            }
            .snowflakes i {
              border-radius: 50%;
              animation: snowFall linear infinite;
            }
            .rain-drops i {
              width: 1px;
              height: 15px;
              opacity: 0.4;
              animation: rainFall linear infinite;
            }
            .lightning-bolt {
              position: fixed;
              top: 0;
              left: 0;
              width: 100vw;
              height: 100vh;
              animation: lightningFlash 5s infinite;
              z-index: 7;
            }
            @media (orientation: landscape) {
              #tree_layer, #sky_atmosphere, #weather_overlay, #lamp_layer, #sky_layer, #wall_bottom, #celestial_body { display: none !important; }
              #sky_atmosphere { display: block !important; }
            }
          `;
        }
      ]]]
    custom_fields:
      blur_overlay: ' '
      wall_bottom: ' '
      lamp_layer: |
        [[[
          const isDay = states['sun.sun'].state === 'above_horizon';

          const now = new Date();
          const month = now.getMonth() + 1;
          const day = now.getDate();

          let img;

          if (month === 10 && day >= 15) {
            img = isDay
              ? "/local/bottom_overlays/New/lamp/lamp-halloween_off.png"
              : "/local/bottom_overlays/New/lamp/lamp-halloween_on.png";
          }

          else if (
            (month === 11) ||
            (month === 12) ||
            (month === 1) ||
            (month === 2) ||
            (month === 3 && day <= 1)
          ) {
            img = isDay
              ? "/local/bottom_overlays/New/lamp/lamp-snow_off.png"
              : "/local/bottom_overlays/New/lamp/lamp-snow_on.png";
          }

          else {
            img = isDay
              ? "/local/bottom_overlays/New/lamp/lamp_off.png"
              : "/local/bottom_overlays/New/lamp/lamp_on.png";
          }

          return `
            <div style="
              position: relative;
              width: 100%;
              height: 100%;
            ">

              ${!isDay ? `
                <div style="
                  position: absolute;
                  top: 20%;
                  left: 50%;
                  width: 140px;
                  height: 140px;
                  filter: blur(10px) brightness(1.1);
                  transform: translate(-50%, -50%);
                  border-radius: 50%;
                  pointer-events: none;

                  background: radial-gradient(circle,
                    rgba(255, 210, 120, 0.35) 0%,
                    rgba(255, 200, 100, 0.2) 30%,
                    rgba(255, 180, 80, 0.1) 55%,
                    rgba(255, 160, 60, 0.05) 75%,
                    transparent 90%
                  );
                "></div>
              ` : ""}

              <img src="${img}" style="
                width: 100%;
                height: 100%;
                object-fit: contain;

                opacity: 0.95;

                filter: ${isDay
                  ? "brightness(0.9) saturate(0.4)"
                  : "brightness(0.95) saturate(1.0)"};

                transition: all 2s ease-in-out;
              ">
            </div>
          `;
        ]]]
      weather_overlay: |
        [[[
          const state = states['weather.forecast_home'].state.toLowerCase();
          let content = '';

          if (['snow', 'sleet', 'hail', 'snowy', 'ice'].some(term => state.includes(term))) {
            content += '<div class="snowflakes">';
            const count = state.includes('heavy') ? 40 : 20;
            for (let i = 0; i < count; i++) {
              content += `<i style="left: ${Math.random()*100}%; width: ${Math.random()*3+2}px; height: ${Math.random()*3+2}px; animation-duration: ${Math.random()*5+5}s; animation-delay: -${Math.random()*10}s; opacity: ${Math.random()*0.6+0.2};"></i>`;
            }
            content += '</div>';
          }

          if (['rain', 'pouring', 'drizzle', 'thunderstorm', 'lightning'].some(term => state.includes(term))) {
            content += '<div class="rain-drops">';
            const count = (state.includes('heavy') || state.includes('pouring') || state.includes('thunderstorm')) ? 60 : 30;
            for (let i = 0; i < count; i++) {
              content += `<i style="left: ${Math.random()*100}%; animation-duration: ${Math.random()*0.5+0.5}s; animation-delay: -${Math.random()*2}s;"></i>`;
            }
            content += '</div>';
          }

          if (state.includes('lightning') || state.includes('thunderstorm')) {
            content += '<div class="lightning-bolt"></div>';
          }

          if (state.includes('fog') || state.includes('mist') || state.includes('smoke') || state.includes('haze') || state.includes('dust')) {
            content += `<div style="position: fixed; width: 100vw; height: 100vh; background: rgba(200,200,220,0.2); backdrop-filter: blur(1px); z-index: 6;"></div>`;
          }

          if (['cloudy', 'overcast', 'partlycloudy'].some(term => state.includes(term))
              && states['sun.sun'].state !== 'above_horizon') {

            content += `<img src="/local/sky/clouds-real.png?v=2"
              style="
                position: fixed;
                top: 0;
                left: 0;

                width: 130vw;
                height: 80vh;
                object-fit: cover;

                opacity: 0.35;

                filter: brightness(0.6) contrast(0.85) saturate(0.6) hue-rotate(-5deg);

                animation: cloudFlow 90s infinite linear;
                z-index: 4;
              ">`;
          }

          return content;
        ]]]
      background_base: |
        [[[
          return `<img src="/local/backgrounds/background_main_flipped.jpg" style="width: 100%; height: 100%; object-fit: cover;">`;
        ]]]
      tree_layer: |
        [[[
          const now = new Date();
          const month = now.getMonth() + 1;
          const day = now.getDate();

          let image = "/local/bottom_overlays/New/trees/trees.png";

          if ((month === 9 && day >= 1) || (month === 10)) {
            image = "/local/bottom_overlays/New/trees/trees-autumn.png";
          }

          else if (month === 11) {
            image = "/local/bottom_overlays/New/trees/trees-snow1.png";
          }

          else if (month === 12) {
            image = "/local/bottom_overlays/New/trees/trees-christmas.png";
          }

          else if (
            (month === 1) ||
            (month === 2) ||
            (month === 3 && day <= 1)
          ) {
            image = "/local/bottom_overlays/New/trees/trees-snow2.png";
          }


          let filter = "brightness(1.1) sepia(0.2) hue-rotate(0deg) saturate(2)";
          if (states['sun.sun'].state != 'above_horizon') {
            filter = "brightness(1) sepia(0.2) hue-rotate(0deg) saturate(1.5) contrast(0.95)";
          }

          return `<img src="${image}" style="width: 100%; height: 100%; object-fit: cover; filter: ${filter}; transition: filter 5s ease-in-out;">`;
        ]]]
      sky_atmosphere: |
        [[[
          return `<div></div>`;
        ]]]
      sky_layer: |
        [[[
          const sun = states['sun.sun'];
          const ele = sun.attributes.elevation;
          const isDay = sun.state == 'above_horizon';
          const weather = states['weather.forecast_home'].state.toLowerCase();

          if (isDay && (weather.includes('sunny') || weather.includes('clear'))) {
            return `<div></div>`;
          }

          if (isDay) {
            let brightPct = 0.5 + (Math.min(ele / 35, 1) * 0.3);
            let sepia = (1 - Math.min(ele / 15, 1)) * 0.3;

            return `<img src="/local/sky/clouds-real.png?v=2"
              style="width: 150vw;
                     object-fit: contain;
                     opacity: 0.7;
                     filter: brightness(${brightPct}) saturate(0.75) sepia(${sepia});
                     animation: cloudFlow 90s infinite linear;
                     transition: filter 5s ease-in-out;">`;
          } else {
            let starBright = 0.5 + (Math.min(Math.abs(ele) / 35, 1) * 0.5);

            return `<img src="/local/sky/stars_v2.png?v=1"
              style="width: 100vw;
                     opacity: 0.9;
                     filter: brightness(${starBright}) sepia(1) saturate(5) hue-rotate(10deg);
                     animation: starTwinkle 15s infinite ease-in-out;
                     transition: filter 15s ease-in-out;">`;
          }
        ]]]
      celestial_body: |
        [[[
          const isDay = states['sun.sun'].attributes.elevation > -1.0;

          if (isDay) {
            return `
              <div style="
                position: relative;
                width: 220px;
                height: 220px;
              ">
                <div style="
                  position: absolute;
                  top: 50%;
                  left: 50%;
                  width: 70px;
                  height: 70px;
                  filter: blur(0px);
                  transform: translate(-50%, -50%);
                  border-radius: 50%;

                  background: radial-gradient(circle,
                    rgba(255, 248, 214, 1) 0%,
                    rgba(255, 224, 138, 0.95) 35%,
                    rgba(255, 201, 77, 0.75) 60%,
                    rgba(255, 179, 0, 0.55) 75%,
                    rgba(255, 160, 0, 0.35) 85%,
                    rgba(20, 40, 70, 0.8) 95%,
                    rgba(20, 40, 70, 0) 100%
                  );


                  box-shadow:
                    0 0 20px 10px rgba(255, 200, 80, 0.35),
                    0 0 45px 25px rgba(255, 180, 60, 0.22),
                    0 0 80px 45px rgba(255, 150, 40, 0.12);
                "></div>
              </div>
            `;
          }

            return `
              <div style="
                position: relative;
                width: 220px;
                height: 220px;
                overflow: visible;
                background: radial-gradient(circle,
                  rgba(255, 230, 150, 0.20) 0%,
                  rgba(255, 220, 140, 0.14) 20%,
                  rgba(255, 200, 120, 0.09) 25%,
                  rgba(255, 180, 100, 0.02) 38%,
                  transparent 40%
                );
                -webkit-mask-image: radial-gradient(circle at 75% 35%, transparent 40%, black 41%);
                mask-image: radial-gradient(circle at 76% 40%, transparent 20%, black 32%);
              ">
                <div style="
                  position: absolute;
                  top: 50%;
                  left: 50%;
                  width: 70px;
                  height: 70px;
                  overflow: visible;
                  filter: blur(5px);
                  transform: translate(-50%, -50%);
                  border-radius: 50%;

                  background:
                    radial-gradient(circle,
                      rgba(255, 240, 170, 0.95) 0%,
                      rgba(250, 225, 150, 0.8) 35%,
                      rgba(235, 210, 130, 0.6) 65%,
                      rgba(210, 190, 110, 0.4) 85%,
                      rgba(12, 18, 35, 0.15) 95%,
                      rgba(12, 18, 35, 0) 100%
                    );


                  -webkit-mask-image: radial-gradient(circle at 85% 45%, transparent 45%, black 46%);
                  mask-image: radial-gradient(circle at 85% 35%, transparent 45%, black 46%);
                "></div>
              </div>
            `;
        ]]]
    styles:
      card:
        - background: none
        - border: none
        - overflow: hidden
        - width: 100%
        - height: 100%
        - padding: 0
      custom_fields:
        lamp_layer:
          - position: fixed
          - bottom: '-40px'
          - overflow: visible
          - left: 20%
          - width: 120px
          - height: 30vh
          - z-index: 0
          - pointer-events: none
        wall_bottom:
          - position: fixed
          - bottom: '-80px'
          - width: 100%
          - height: 25%
          - z-index: 1
          - background-image: |
              [[[
                const now = new Date();
                const month = now.getMonth() + 1;
                const day = now.getDate();

                let image = "/local/bottom_overlays/New/fence/fence-wide.png";


                if (month === 10 && day >= 15) {
                  image = "/local/bottom_overlays/New/fence/fence-halloween-wide.png";
                }

                else if (month === 11) {
                  image = "/local/bottom_overlays/New/fence/fence-snow-wide.png";
                }

                else if (month === 12) {
                  image = "/local/bottom_overlays/New/fence/fence-christmas-wide.png";
                }

                else if (
                  (month === 1) ||
                  (month === 2) ||
                  (month === 3 && day <= 1)
                ) {
                  image = "/local/bottom_overlays/New/fence/fence-snow-wide.png";
                }

                return `url(${image})`;
              ]]]
          - background-size: cover
          - pointer-events: none
          - filter: >-
              brightness(0.9) saturate(0.95) contrast(0.85) sepia(0.25)
              opacity(0.9) blur(0px)
        weather_overlay:
          - position: fixed
          - top: 0
          - left: 0
          - width: 100vw
          - height: 100vh
          - z-index: 6
          - pointer-events: none
        blur_overlay:
          - position: absolute
          - top: 0
          - left: 0
          - width: 100%
          - height: 100%
          - z-index: 2
          - pointer-events: none
          - backdrop-filter: brightness(0.7) contrast(0.85) saturate(0.9)
          - background: rgba(50, 100, 120, 0.08)
        background_base:
          - position: fixed
          - top: 0
          - left: 0
          - width: 100vw
          - height: 100vh
          - z-index: 0
          - pointer-events: none
          - display: >
              [[[ return window.location.pathname.includes('config') ? 'none' :
              'block' ]]]
        tree_layer:
          - position: fixed
          - bottom: 0px
          - left: 0
          - overflow: visible
          - width: 100vw
          - height: 28vh
          - z-index: |
              [[[
                const state = states['weather.forecast_home'].state.toLowerCase();
                const isFoggy = ['fog', 'mist', 'smoke', 'haze', 'dust', 'cloudy', 'partlycloudy'].some(term => state.includes(term));

                return isFoggy ? -1 : -4;
              ]]]
          - pointer-events: none
          - background: none
          - filter: brightness(0.75) saturate(0.65) contrast(0.9)
        sky_atmosphere:
          - position: fixed
          - top: 0
          - left: 0
          - width: 100vw
          - height: 100vh
          - z-index: 1
          - transition: background 5s ease-in-out
          - background: |
              [[[
                const sun = states['sun.sun'];
                const ele = sun.attributes.elevation;
                const isDay = sun.state === 'above_horizon';

                const lerp = (a, b, t) => a + (b - a) * t;
                const blend = (c1, c2, t) =>
                  `rgba(${lerp(c1[0], c2[0], t)}, ${lerp(c1[1], c2[1], t)}, ${lerp(c1[2], c2[2], t)}, ${lerp(c1[3], c2[3], t)})`;

                if (isDay) {
                  let progress = Math.min(Math.max(ele / 45, 0), 1);
                  const pct = Math.pow(progress, 0.6);

                  let top = blend(
                    [10, 20, 125, 0.65],
                    [5, 10, 80, 0.6],
                    pct
                  );

                  let mid = blend(
                    [60, 120, 150, 0.55],
                    [110, 165, 190, 0.5],
                    pct
                  );

                  let bot;
                  if (ele < 18) {
                    let warmPct = Math.max(0, (10 - ele) / 10);
                    let glowIntensity = Math.pow(warmPct, 0.8);

                    bot = blend(
                      [202, 110, 70, 0.85],
                      [200, 65, 10, 0.55],
                      glowIntensity
                    );
                  } else {
                    bot = blend(
                      [75, 140, 145, 0.6],
                      [80, 110, 150, 0.8],
                      pct
                    );
                  }

                  return `linear-gradient(180deg, ${top} 0%, ${mid} 50%, ${bot} 95%)`;
                }

                const absEle = Math.abs(ele);

                if (ele < -20) {
                  return `
                    linear-gradient(
                      180deg,
                      rgba(8, 12, 25, 0.85) 0%,
                      rgba(12, 18, 35, 0.75) 100%
                    )
                  `;
                }

                let pct = Math.min(absEle / 20, 1);
                let top = blend([8, 12, 25, 0.85], [20, 30, 50, 0.7], pct);
                let bot = blend([12, 18, 35, 0.75], [40, 60, 80, 0.6], pct);

                return `linear-gradient(180deg, ${top} 0%, ${bot} 100%)`;
              ]]]
        sky_layer:
          - position: contain
          - top: 10%
          - height: 100vh
          - left: 0
          - width: 100vw
          - filter: brightness(0.85) saturate(0.65) blur(0.5px) opacity(0.3)
          - z-index: 3
        celestial_body:
          - position: fixed
          - overflow: visible
          - transition: all 2s ease-in-out
          - z-index: 4
          - width: >
              [[[ return states['sun.sun'].state == 'above_horizon' ? '110px' :
              '100px'; ]]]
          - height: >
              [[[ return states['sun.sun'].state == 'above_horizon' ? '90px' :
              '80px'; ]]]
          - filter: |
              [[[
                const isDay = states['sun.sun'].state == 'above_horizon';
                const brightness = isDay ? "brightness(0.8) sepia(0.1) saturate(0.9) contrast(0.8) opacity(0.8)" : "brightness(0.8) saturate(0.7) opacity(0.85)";
                const shadow = isDay
                  ? "drop-shadow(0px 0px 15px rgba(255, 200, 50, 0.8))"
                  : "drop-shadow(0px 0px 5px rgba(255, 255, 255, 0.2))";

                return `${brightness} ${shadow}`;
              ]]]
          - bottom: |
              [[[
                const ele = states['sun.sun'].attributes.elevation;
                const isDay = states['sun.sun'].state === 'above_horizon';
                const dayPeak = 60;

                let pct = isDay
                  ? Math.max(0, Math.min(ele / dayPeak, 1))
                  : Math.max(0, Math.min(Math.abs(ele) / 35, 1));

                return (19 + (pct * 30)) + '%';
              ]]]
          - left: |
              [[[
                const now = Date.now();

                const nextSunrise = new Date(states['sun.sun'].attributes.next_rising).getTime();
                const nextSunset  = new Date(states['sun.sun'].attributes.next_setting).getTime();

                let progress;

                if (states['sun.sun'].state === 'above_horizon') {
                  const todaySunrise = nextSunrise - 24 * 60 * 60 * 1000;
                  progress = (now - todaySunrise) / (nextSunset - todaySunrise);
                } else {
                  const todaySunset = nextSunset - 24 * 60 * 60 * 1000;
                  progress = (now - todaySunset) / (nextSunrise - todaySunset);
                }

                progress = Math.min(Math.max(progress, 0), 1);

                const percent = 15 + (progress * 75);

                return `calc(${percent}% - 110px)`;
              ]]]