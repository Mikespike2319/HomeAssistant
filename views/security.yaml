title: Security
path: security
icon: mdi:shield-home
type: sections
max_columns: 1
dense_section_placement: true
sections:
- type: grid
  cards:
  - type: custom:button-card
    template: sky_system
  - type: custom:button-card
    template: mf_page_title
    variables:
      title: Security
      subtitle: Cameras, alarm state, and quick house modes.
  - type: custom:button-card
    template: mf_hero
    entity: alarm_control_panel.blink_michael_trinidad
    variables:
      icon: mdi:shield-check-outline
      value: '[[[ return entity?.state === "armed_away" ? "Armed" : entity?.state === "disarmed" ? "Clear" : entity?.state || "Ready"; ]]]'
      subtitle: Front door clear · car locked · sentry on
      accent_color: rgba(157,226,182,0.95)
  - type: horizontal-stack
    cards:
    - type: custom:button-card
      template: mf_pill
      variables:
        icon: mdi:home-outline
        label: Stand down
        accent_color: rgba(157,226,182,0.95)
      tap_action:
        action: call-service
        service: alarm_control_panel.alarm_disarm
        target:
          entity_id: alarm_control_panel.blink_michael_trinidad
    - type: custom:button-card
      template: mf_pill
      variables:
        icon: mdi:bed-king-outline
        label: Tuck us in
        accent_color: rgba(243,166,184,0.95)
      tap_action:
        action: call-service
        service: alarm_control_panel.alarm_arm_home
        target:
          entity_id: alarm_control_panel.blink_michael_trinidad
    - type: custom:button-card
      template: mf_pill
      variables:
        icon: mdi:eye-outline
        label: We're out
        accent_color: rgba(121,199,255,0.95)
      tap_action:
        action: call-service
        service: alarm_control_panel.alarm_arm_away
        target:
          entity_id: alarm_control_panel.blink_michael_trinidad
  - type: grid
    columns: 2
    square: false
    cards:
    - type: custom:button-card
      template: mf_tile
      entity: binary_sensor.front_door_motion
      variables:
        icon: mdi:door-open
        title: Front door
        value: '[[[ return entity?.state === "on" ? "Motion" : "Clear"; ]]]'
        subtitle: Blink
        accent_color: rgba(157,226,182,0.95)
    - type: custom:button-card
      template: mf_tile
      entity: camera.blink_front_door
      variables:
        icon: mdi:cctv
        title: Side camera
        value: Ready
        subtitle: Driveway
        accent_color: rgba(121,199,255,0.95)
  - type: custom:button-card
    template: mf_section_label
    variables:
      icon: mdi:list-status
      label: Recent state
      accent_color: rgba(121,199,255,0.95)
  - type: grid
    columns: 1
    square: false
    cards:
    - type: custom:button-card
      template: mf_tile
      entity: lock.el_rocco_lock
      variables:
        icon: mdi:car-door-lock
        title: El Rocco
        value: '[[[ return entity?.state === "locked" ? "Locked" : entity?.state || "Unknown"; ]]]'
        subtitle: Sentry linked from car page
        accent_color: rgba(121,199,255,0.95)
