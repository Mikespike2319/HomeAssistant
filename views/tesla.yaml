title: El Rocco
path: tesla
icon: mdi:car-electric
type: sections
max_columns: 1
dense_section_placement: true
sections:
- type: grid
  cards:
  - type: custom:button-card
    template: sky_system
  - type: custom:button-card
    template: mf_page_title
    variables:
      title: El Rocco
      subtitle: Charge, climate, locks, and trip status.
  - type: custom:button-card
    template: mf_model_y_juniper
  - type: grid
    columns: 2
    square: false
    cards:
    - type: custom:button-card
      template: mf_tile
      entity: sensor.el_rocco_battery_level
      variables:
        icon: mdi:battery-charging-60
        title: Battery
        value: '[[[ return (entity?.state || "48") + "%"; ]]]'
        subtitle: charging
        accent_color: rgba(241,194,122,0.96)
    - type: custom:button-card
      template: mf_tile
      entity: sensor.el_rocco_battery_range
      variables:
        icon: mdi:map-marker-distance
        title: Range
        value: '[[[ return Math.round(Number(entity?.state || 145)) + " mi"; ]]]'
        subtitle: ready
        accent_color: rgba(136,199,216,0.95)
    - type: custom:button-card
      template: mf_tile
      entity: lock.el_rocco_lock
      variables:
        icon: mdi:car-door-lock
        title: Lock
        value: '[[[ return entity?.state === "locked" ? "Locked" : entity?.state || "Unknown"; ]]]'
        subtitle: secure
        accent_color: rgba(156,201,162,0.95)
  - type: grid
    columns: 2
    square: false
    cards:
    - type: custom:button-card
      template: mf_tile
      entity: switch.el_rocco_sentry_mode
      variables:
        icon: mdi:eye-outline
        title: Sentry
        value: '[[[ return entity?.state === "on" ? "On" : "Off"; ]]]'
        subtitle: watching
    - type: custom:button-card
      template: mf_tile
      entity: climate.el_rocco_climate
      variables:
        icon: mdi:thermometer
        title: Climate
        value: '[[[ return (entity?.attributes?.temperature || 70) + "°"; ]]]'
        subtitle: cabin
    - type: custom:button-card
      template: mf_tile
      entity: sensor.el_rocco_charger_power
      variables:
        icon: mdi:lightning-bolt-outline
        title: Charge
        value: '[[[ return (entity?.state || "7") + " kW"; ]]]'
        subtitle: '[[[ return states["sensor.el_rocco_time_to_full_charge"]?.state ? states["sensor.el_rocco_time_to_full_charge"].state + " left" : "6 hr left"; ]]]'
        accent_color: rgba(241,194,122,0.96)
    - type: custom:button-card
      template: mf_tile
      entity: cover.el_rocco_frunk
      variables:
        icon: mdi:package-variant-closed
        title: Frunk
        value: '[[[ return entity?.state === "closed" ? "Closed" : entity?.state || "Ready"; ]]]'
        subtitle: ready
        accent_color: rgba(241,194,122,0.96)
    - type: custom:button-card
      template: mf_tile
      entity: cover.el_rocco_trunk
      variables:
        icon: mdi:car-back
        title: Trunk
        value: '[[[ return entity?.state === "closed" ? "Closed" : entity?.state || "Ready"; ]]]'
        subtitle: ready
        accent_color: rgba(241,194,122,0.96)
    - type: custom:button-card
      template: mf_tile
      entity: cover.el_rocco_charge_port_door
      variables:
        icon: mdi:ev-plug-tesla
        title: Charge port
        value: '[[[ return entity?.state || "Closed"; ]]]'
        subtitle: port
  - type: horizontal-stack
    cards:
    - type: custom:button-card
      template: mf_pill
      variables:
        icon: mdi:thermometer-chevron-up
        label: Pre-heat
        accent_color: rgba(241,194,122,0.96)
      tap_action:
        action: call-service
        service: climate.set_temperature
        target:
          entity_id: climate.el_rocco_climate
        data:
          temperature: 72
    - type: custom:button-card
      template: mf_pill
      variables:
        icon: mdi:snowflake
        label: Pre-cool
        accent_color: rgba(136,199,216,0.95)
      tap_action:
        action: call-service
        service: climate.set_temperature
        target:
          entity_id: climate.el_rocco_climate
        data:
          temperature: 68
    - type: custom:button-card
      template: mf_pill
      variables:
        icon: mdi:star-four-points-outline
        label: Flash
        accent_color: rgba(241,194,122,0.96)
      tap_action:
        action: call-service
        service: button.press
        target:
          entity_id: button.el_rocco_flash_lights
  - type: horizontal-stack
    cards:
    - type: custom:button-card
      template: mf_pill
      variables:
        icon: mdi:white-balance-sunny
        label: Wake
        accent_color: rgba(241,194,122,0.96)
      tap_action:
        action: call-service
        service: button.press
        target:
          entity_id: button.el_rocco_wake
    - type: custom:button-card
      template: mf_pill
      variables:
        icon: mdi:horn
        label: Horn
        accent_color: rgba(217,154,169,0.95)
      tap_action:
        action: call-service
        service: button.press
        target:
          entity_id: button.el_rocco_honk_horn
    - type: custom:button-card
      template: mf_pill
      variables:
        icon: mdi:car-door
        label: Vent
        accent_color: rgba(136,199,216,0.95)
      tap_action:
        action: call-service
        service: cover.open_cover
        target:
          entity_id: cover.el_rocco_windows
  - type: custom:button-card
    template: mf_section_label
    variables:
      icon: mdi:list-status
      label: Cabin + updates
      accent_color: rgba(136,199,216,0.95)
  - type: grid
    columns: 2
    square: false
    cards:
    - type: custom:button-card
      template: mf_tile
      entity: sensor.el_rocco_inside_temperature
      variables:
        icon: mdi:thermometer
        title: Inside
        value: '[[[ return (entity?.state || "58") + "°"; ]]]'
        subtitle: cabin temp
    - type: custom:button-card
      template: mf_tile
      entity: sensor.el_rocco_outside_temperature
      variables:
        icon: mdi:thermometer-low
        title: Outside
        value: '[[[ return (entity?.state || "55") + "°"; ]]]'
        subtitle: weather
    - type: custom:button-card
      template: mf_tile
      entity: update.el_rocco_update
      variables:
        icon: mdi:update
        title: Software
        value: '[[[ return entity?.state === "off" ? "Current" : entity?.state || "Ready"; ]]]'
        subtitle: updates
    - type: custom:button-card
      template: mf_tile
      entity: binary_sensor.el_rocco_status
      variables:
        icon: mdi:access-point-network
        title: Online
        value: '[[[ return entity?.state === "on" ? "Connected" : entity?.state || "Unknown"; ]]]'
        subtitle: Tesla API
