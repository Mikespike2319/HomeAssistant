title: Lights
path: lights
icon: mdi:lightbulb-group
type: sections
max_columns: 1
dense_section_placement: true
sections:
- type: grid
  cards:
  - type: custom:button-card
    template: sky_system
  - type: custom:button-card
    template: mf_page_title
    variables:
      title: Lights
      subtitle: Rooms, scenes, and every glow in one rhythm.
  - type: horizontal-stack
    cards:
    - type: custom:button-card
      template: mf_pill
      variables:
        icon: mdi:weather-sunset
        label: Dreamy dusk
        accent_color: rgba(255,211,164,0.96)
      tap_action:
        action: call-service
        service: scene.turn_on
        target:
          entity_id: scene.living_room_dreamy_dusk
    - type: custom:button-card
      template: mf_pill
      variables:
        icon: mdi:movie-open-outline
        label: Movie night
        accent_color: rgba(121,199,255,0.95)
      tap_action:
        action: call-service
        service: scene.turn_on
        target:
          entity_id: scene.living_room_nighttime
  - type: horizontal-stack
    cards:
    - type: custom:button-card
      template: mf_pill
      variables:
        icon: mdi:white-balance-sunny
        label: Bright morning
        accent_color: rgba(255,211,164,0.96)
      tap_action:
        action: call-service
        service: scene.turn_on
        target:
          entity_id: scene.living_room_energize
    - type: custom:button-card
      template: mf_pill
      variables:
        icon: mdi:moon-waning-crescent
        label: Wind down
        accent_color: rgba(243,166,184,0.95)
      tap_action:
        action: call-service
        service: scene.turn_on
        target:
          entity_id: scene.bedroom_dreamy_dusk
  - type: horizontal-stack
    cards:
    - type: custom:button-card
      template: mf_pill
      variables:
        icon: mdi:star-four-points-outline
        label: Sweet dreams
        accent_color: rgba(121,199,255,0.95)
      tap_action:
        action: call-service
        service: scene.turn_on
        target:
          entity_id: scene.bedroom_nighttime
    - type: custom:button-card
      template: mf_pill
      variables:
        icon: mdi:coffee-outline
        label: Wake up
        accent_color: rgba(255,211,164,0.96)
      tap_action:
        action: call-service
        service: scene.turn_on
        target:
          entity_id: scene.bedroom_energize
  - type: custom:button-card
    template: mf_section_label
    variables:
      icon: mdi:sofa-outline
      label: Living room
      accent_color: rgba(121,199,255,0.95)
  - type: grid
    columns: 3
    square: false
    cards:
    - type: custom:button-card
      template: mf_tile
      entity: light.living_room_2
      variables:
        icon: mdi:lightbulb-group-outline
        title: All living room
        value: '[[[ return entity?.state === "on" ? "on" : "off"; ]]]'
        subtitle: '[[[ return entity?.state === "on" ? "glowing" : "resting"; ]]]'
    - type: custom:button-card
      template: mf_tile
      entity: light.couch
      variables:
        icon: mdi:sofa-outline
        title: Couch
        value: '[[[ return entity?.state === "on" ? "on" : "off"; ]]]'
        subtitle: '[[[ return entity?.state === "on" ? "glowing" : "resting"; ]]]'
    - type: custom:button-card
      template: mf_tile
      entity: light.tv
      variables:
        icon: mdi:television
        title: TV
        value: '[[[ return entity?.state === "on" ? "on" : "off"; ]]]'
        subtitle: '[[[ return entity?.state === "on" ? "glowing" : "resting"; ]]]'
    - type: custom:button-card
      template: mf_tile
      entity: light.backlight_tv
      variables:
        icon: mdi:television-ambient-light
        title: TV backlight
        value: '[[[ return entity?.state === "on" ? "on" : "off"; ]]]'
        subtitle: '[[[ return entity?.state === "on" ? "glowing" : "resting"; ]]]'
    - type: custom:button-card
      template: mf_tile
      entity: light.ceiling
      variables:
        icon: mdi:ceiling-light-outline
        title: Ceiling
        value: '[[[ return entity?.state === "on" ? "on" : "off"; ]]]'
        subtitle: '[[[ return entity?.state === "on" ? "glowing" : "resting"; ]]]'
    - type: custom:button-card
      template: mf_tile
      entity: light.ceiling_2
      variables:
        icon: mdi:ceiling-light-outline
        title: Ceiling back
        value: '[[[ return entity?.state === "on" ? "on" : "off"; ]]]'
        subtitle: '[[[ return entity?.state === "on" ? "glowing" : "resting"; ]]]'
  - type: custom:button-card
    template: mf_section_label
    variables:
      icon: mdi:bed-king-outline
      label: Bedroom
      accent_color: rgba(243,166,184,0.95)
  - type: grid
    columns: 3
    square: false
    cards:
    - type: custom:button-card
      template: mf_tile
      entity: light.bedroom
      variables:
        icon: mdi:bed-king-outline
        title: All bedroom
        value: '[[[ return entity?.state === "on" ? Math.round(entity.attributes?.brightness / 2.55) + "%" : "off"; ]]]'
        subtitle: '[[[ return entity?.state === "on" ? "glowing" : "resting"; ]]]'
        accent_color: rgba(255,211,164,0.96)
    - type: custom:button-card
      template: mf_tile
      entity: light.mike_side_lamp
      variables:
        icon: mdi:moon-waning-crescent
        title: Mike's side
        value: '[[[ return entity?.state === "on" ? "on" : "off"; ]]]'
        subtitle: '[[[ return entity?.state === "on" ? "glowing" : "resting"; ]]]'
    - type: custom:button-card
      template: mf_tile
      entity: light.kiara_side_lamp
      variables:
        icon: mdi:moon-waxing-crescent
        title: Kiara's side
        value: '[[[ return entity?.state === "on" ? "on" : "off"; ]]]'
        subtitle: '[[[ return entity?.state === "on" ? "glowing" : "resting"; ]]]'
    - type: custom:button-card
      template: mf_tile
      entity: light.light_panels_51_66_88
      variables:
        icon: mdi:hexagon-multiple-outline
        title: Light panels
        value: '[[[ return entity?.state === "on" ? "on" : "off"; ]]]'
        subtitle: '[[[ return entity?.state === "on" ? "glowing" : "resting"; ]]]'
    - type: custom:button-card
      template: mf_tile
      entity: light.big_lamp
      variables:
        icon: mdi:floor-lamp-outline
        title: Big lamp
        value: '[[[ return entity?.state === "on" ? Math.round(entity.attributes?.brightness / 2.55) + "%" : "off"; ]]]'
        subtitle: '[[[ return entity?.state === "on" ? "glowing" : "resting"; ]]]'
        accent_color: rgba(255,211,164,0.96)
