title: Lights
path: lights
icon: mdi:lightbulb-group
type: sections
max_columns: 3
cards:
- type: custom:button-card
  template: sky_system
- type: custom:mod-card
  style: "ha-card {\n  background: transparent !important;\n  border: none !important;\n  box-shadow: none !important;\n  margin-top: 14vh;\n}\n"
  card:
    type: markdown
    content: "<div style=\"\n  font-family: 'Caveat', 'Dancing Script', Georgia, cursive;\n  font-style: italic;\n  font-size: 36px;\n  font-weight: 500;\n  color: rgba(255, 230, 210, 0.92);\n  text-shadow: 0 2px 8px rgba(0,0,0,0.5);\n  text-align: center;\n  letter-spacing: 0.02em;\n\">\n  A little glow ✨\n</div>\n"
- type: horizontal-stack
  cards:
  - type: custom:button-card
    template: cozy_scene_pill
    variables:
      scene_entity: scene.living_room_dreamy_dusk
      label: Dreamy dusk
      emoji: 🌅
      accent: warm
  - type: custom:button-card
    template: cozy_scene_pill
    variables:
      scene_entity: scene.living_room_nighttime
      label: Movie night
      emoji: 🎬
      accent: neutral
  - type: custom:button-card
    template: cozy_scene_pill
    variables:
      scene_entity: scene.living_room_energize
      label: Bright morning
      emoji: ☀️
      accent: cool
- type: horizontal-stack
