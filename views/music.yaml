title: Music
path: music
icon: mdi:music
type: sections
max_columns: 1
dense_section_placement: true
sections:
- type: grid
  cards:
  - type: custom:button-card
    template: sky_system
  - type: custom:button-card
    template: mf_page_title
    variables:
      title: Music
      subtitle: Sonos, Spotify, TVs, and room audio.
  - type: custom:button-card
    template: mf_hero
    entity: media_player.den
    variables:
      icon: mdi:speaker-wireless
      value: Den
      subtitle: Sonos Era 100 · 192.168.50.51 · ready after HA integration
      accent_color: rgba(157,226,182,0.95)
  - type: grid
    columns: 2
    square: false
    cards:
    - type: custom:button-card
      template: mf_tile
      entity: media_player.den
      variables:
        icon: mdi:speaker-wireless
        title: Sonos Den
        value: '[[[ return entity?.state === "playing" ? "Playing" : entity?.state === "unavailable" ? "Add in HA" : "Ready"; ]]]'
        subtitle: Era 100
        accent_color: rgba(157,226,182,0.95)
    - type: custom:button-card
      template: mf_tile
      entity: media_player.spotifyplus_michael_trinidad
      variables:
        icon: mdi:music-circle-outline
        title: Spotify
        value: '[[[ return entity?.state === "playing" ? "Playing" : "Ready"; ]]]'
        subtitle: Mike's Spotify
        accent_color: rgba(157,226,182,0.95)
    - type: custom:button-card
      template: mf_tile
      entity: media_player.echo_dot
      variables:
        icon: mdi:speaker-wireless
        title: Echo Dot
        value: '[[[ return entity?.state === "playing" ? "Playing" : "Idle"; ]]]'
        subtitle: Local speaker
        accent_color: rgba(121,199,255,0.95)
    - type: custom:button-card
      template: mf_tile
      entity: media_player.bedroom_tv
      variables:
        icon: mdi:youtube-tv
        title: Bedroom TV
        value: '[[[ return entity?.state === "playing" ? "Playing" : entity?.state || "Ready"; ]]]'
        subtitle: YouTube
        accent_color: rgba(255,211,164,0.96)
    - type: custom:button-card
      template: mf_tile
      entity: media_player.lg_tv
      variables:
        icon: mdi:television
        title: LG TV
        value: '[[[ return entity?.state || "Unavailable"; ]]]'
        subtitle: Living room
        accent_color: rgba(121,199,255,0.95)
  - type: horizontal-stack
    cards:
    - type: custom:button-card
      template: mf_pill
      variables:
        icon: mdi:pause
        label: Pause everything
        accent_color: rgba(255,211,164,0.96)
      tap_action:
        action: call-service
        service: media_player.media_pause
        target:
          entity_id:
          - media_player.den
          - media_player.spotifyplus_michael_trinidad
          - media_player.echo_dot
          - media_player.bedroom_tv
    - type: custom:button-card
      template: mf_pill
      variables:
        icon: mdi:volume-mute
        label: Mute everything
        accent_color: rgba(243,166,184,0.95)
      tap_action:
        action: call-service
        service: media_player.volume_mute
        target:
          entity_id:
          - media_player.den
          - media_player.echo_dot
          - media_player.bedroom_tv
        data:
          is_volume_muted: true
