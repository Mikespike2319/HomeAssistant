title: Music
path: music
icon: mdi:music
type: sections
max_columns: 1
dense_section_placement: true
sections:
- type: grid
  cards:
  - type: custom:button-card
    template: sky_system
  - type: custom:button-card
    template: mf_page_title
    variables:
      title: Media
      subtitle: TVs, Sonos, Spotify, and room audio.
  - type: custom:button-card
    template: mf_hero
    entity: media_player.den
    variables:
      icon: mdi:speaker-wireless
      value: Den
      subtitle: Sonos Era 100 · 192.168.50.51 · ready after HA integration
      accent_color: rgba(156,201,162,0.95)
  - type: grid
    columns: 2
    square: false
    cards:
    - type: custom:button-card
      template: mf_tile
      entity: media_player.den
      variables:
        icon: mdi:speaker-wireless
        title: Sonos Den
        value: '[[[ return entity?.state === "playing" ? "Playing" : entity?.state === "unavailable" ? "Add in HA" : "Ready"; ]]]'
        subtitle: Era 100
        accent_color: rgba(156,201,162,0.95)
    - type: custom:button-card
      template: mf_tile
      entity: media_player.roam_2
      variables:
        icon: mdi:speaker-bluetooth
        title: Sonos Roam
        value: '[[[ return entity?.state === "playing" ? "Playing" : entity?.state === "unavailable" ? "Off" : "Ready"; ]]]'
        subtitle: Portable
        accent_color: rgba(157,226,182,0.95)
    - type: custom:button-card
      template: mf_tile
      entity: media_player.spotify_michael_sanchez
      variables:
        icon: mdi:music-circle-outline
        title: Spotify
        value: '[[[ return entity?.state === "playing" ? "Playing" : "Ready"; ]]]'
        subtitle: Mike's Spotify
        accent_color: rgba(156,201,162,0.95)
    - type: custom:button-card
      template: mf_tile
      entity: media_player.michael_s_2nd_echo_dot
      variables:
        icon: mdi:speaker-wireless
        title: Echo Dot
        value: '[[[ return entity?.state === "playing" ? "Playing" : "Idle"; ]]]'
        subtitle: Local speaker
        accent_color: rgba(136,199,216,0.95)
    - type: custom:button-card
      template: mf_tile
      entity: media_player.lg_webos_tv_6651
      variables:
        icon: mdi:youtube-tv
        title: Bedroom TV
        value: '[[[ return entity?.state === "playing" ? "Playing" : entity?.state || "Ready"; ]]]'
        subtitle: YouTube
        accent_color: rgba(241,194,122,0.96)
    - type: custom:button-card
      template: mf_tile
      entity: media_player.lg_webos_tv_ua7700pub
      variables:
        icon: mdi:television
        title: LG TV
        value: '[[[ return entity?.state || "Unavailable"; ]]]'
        subtitle: Living room
        accent_color: rgba(136,199,216,0.95)
  - type: horizontal-stack
    cards:
    - type: custom:button-card
      template: mf_pill
      variables:
        icon: mdi:pause
        label: Pause everything
        accent_color: rgba(241,194,122,0.96)
      tap_action:
        action: call-service
        service: media_player.media_pause
        target:
          entity_id:
          - media_player.den
          - media_player.roam_2
          - media_player.spotify_michael_sanchez
          - media_player.michael_s_2nd_echo_dot
          - media_player.bed_room_tv
          - media_player.32q3k_2
          - media_player.luna_s_firetvstick
    - type: custom:button-card
      template: mf_pill
      variables:
        icon: mdi:volume-mute
        label: Mute everything
        accent_color: rgba(217,154,169,0.95)
      tap_action:
        action: call-service
        service: media_player.volume_mute
        target:
          entity_id:
          - media_player.den
          - media_player.roam_2
          - media_player.michael_s_2nd_echo_dot
          - media_player.bed_room_tv
          - media_player.32q3k_2
          - media_player.luna_s_firetvstick
        data:
          is_volume_muted: true

  - type: custom:navbar-card
    routes:
    - url: /mobile-forge/home
      icon: mdi:home
    - url: /mobile-forge/lights
      icon: mdi:lightbulb
    - url: /mobile-forge/music
      icon: mdi:music
    - url: /mobile-forge/tesla
      icon: mdi:car-electric
    - url: /mobile-forge/security
      icon: mdi:shield-lock
    - url: /mobile-forge/sebastian
      icon: mdi:robot-outline
    - url: /mobile-forge/settings
      icon: mdi:cog
    card_mod:
      style: |
        :host { position: fixed !important; bottom: 0 !important; left: 0 !important; right: 0 !important; z-index: 999 !important; }
        ha-card { border-radius: 0 !important; border-top: 1px solid rgba(255,255,255,0.06); background: rgba(22,22,26,0.85); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); padding-bottom: env(safe-area-inset-bottom, 0px); }
