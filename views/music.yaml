title: Music
path: music
icon: mdi:music
type: sections
max_columns: 2
cards:
- type: custom:button-card
  template: sky_system
- type: custom:mod-card
  style: "ha-card {\n  background: transparent !important;\n  border: none !important;\n  box-shadow: none !important;\n  margin-top: 14vh;\n}\n"
  card:
    type: markdown
    content: "<div style=\"\n  font-family: 'Caveat', 'Dancing Script', Georgia, cursive;\n  font-style: italic;\n  font-size: 36px;\n  font-weight: 500;\n  color: rgba(255, 230, 210, 0.92);\n  text-shadow: 0 2px 8px rgba(0,0,0,0.5);\n  text-align: center;\n  letter-spacing: 0.02em;\n\">\n  Press play \U0001F3B5\n</div>\n"
- type: custom:mod-card
  style: 'ha-card { background: transparent !important; border: none !important; box-shadow: none !important; }

    '
  card:
    type: markdown
    content: "<div style=\"font-family:'Caveat',cursive; font-style:italic; font-size:22px; color:rgba(255,220,200,0.85); margin-left:8px;\">\n  \U0001F6CB Living room\n</div>\n"
- type: grid
