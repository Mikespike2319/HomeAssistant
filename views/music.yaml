    variables:
      media_player_entity: media_player.lg_webos_tv_ua7700pub
      cute_name: TV (UA7700)
      emoji: 📺
- type: horizontal-stack
  cards:
  - type: custom:button-card
    template: cozy_scene_pill
    variables:
      label: Pause everything
      emoji: ⏸
      accent: neutral
    tap_action:
      action: call-service
      service: media_player.media_pause
      target:
        entity_id: all
  - type: custom:button-card
    template: cozy_scene_pill
    variables:
      label: Mute everything
      emoji: 🔇
      accent: cool
    tap_action:
      action: call-service
      service: media_player.volume_mute
      target:
        entity_id: all
      data:
        is_volume_muted: true
- type: custom:mod-card
  style: "ha-card {\n  background: rgba(20, 17, 24, 0.5) !important;\n  backdrop-filter: blur(14px) saturate(140%);\n  border: 1px dashed rgba(255, 220, 195, 0.25) !important;\n  border-radius: 18px !important;\n  padding: 16px !important;\n}\n"
  card:
    type: markdown
    content: "<div style=\"font-family: 'Caveat', cursive; font-style: italic; font-size: 18px; color: rgba(255, 220, 200, 0.8);\">\n  ✨ <b>Want to add Sonos?</b><br/>\n  Settings → Devices & Services → Add Integration → search \"Sonos\" — HA finds them automatically on your network. They'll appear here as new tiles.\n</div>\n"
