title: House
path: house
icon: mdi:robot-vacuum
type: sections
max_columns: 1
dense_section_placement: true
sections:
- type: grid
  cards:
  - type: custom:button-card
    template: sky_system
  - type: custom:button-card
    template: mf_page_title
    variables:
      title: House
      subtitle: Roomba, cabin climate, and home devices.
  - type: custom:button-card
    template: mf_hero
    entity: vacuum.roomba
    variables:
      icon: mdi:robot-vacuum
      value: '[[[ return entity?.state === "unavailable" || !entity ? "Ready" : entity.state.replace("_", " "); ]]]'
      subtitle: Roomba not online yet · El Rocco cabin climate available
      accent_color: rgba(121,199,255,0.95)
  - type: grid
    columns: 2
    square: false
    cards:
    - type: custom:button-card
      template: mf_tile
      entity: vacuum.roomba
      variables:
        icon: mdi:robot-vacuum
        title: Roomba
        value: '[[[ return entity?.state === "unavailable" || !entity ? "Offline" : entity.state.replace("_", " "); ]]]'
        subtitle: Power on dock to add
        accent_color: rgba(121,199,255,0.95)
    - type: custom:button-card
      template: mf_tile
      entity: climate.el_rocco_climate
      variables:
        icon: mdi:thermometer
        title: Cabin climate
        value: '[[[ return (entity?.attributes?.temperature || 70) + "°"; ]]]'
        subtitle: El Rocco
    - type: custom:button-card
      template: mf_tile
      entity: light.living_room_2
      variables:
        icon: mdi:bridge
        title: Hue bridge
        value: 14 lights
        subtitle: Already integrated
        accent_color: rgba(255,211,164,0.96)
    - type: custom:button-card
      template: mf_tile
      variables:
        icon: mdi:robot-happy-outline
        title: Sebastian
        value: Online
        subtitle: Assistant ready
        accent_color: rgba(157,226,182,0.95)
  - type: horizontal-stack
    cards:
    - type: custom:button-card
      template: mf_pill
      variables:
        icon: mdi:home-import-outline
        label: Dock
        accent_color: rgba(157,226,182,0.95)
      tap_action:
        action: call-service
        service: vacuum.return_to_base
        target:
          entity_id: vacuum.roomba
    - type: custom:button-card
      template: mf_pill
      variables:
        icon: mdi:star-four-points-outline
        label: Clean kitchen
        accent_color: rgba(255,211,164,0.96)
      tap_action:
        action: call-service
        service: vacuum.start
        target:
          entity_id: vacuum.roomba
    - type: custom:button-card
      template: mf_pill
      variables:
        icon: mdi:pause
        label: Pause
        accent_color: rgba(243,166,184,0.95)
      tap_action:
        action: call-service
        service: vacuum.pause
        target:
          entity_id: vacuum.roomba
